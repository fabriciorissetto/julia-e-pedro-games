<!doctype html>
<html><head><meta charset="utf-8"><title>Atlas Debug</title>
<style>
  body { background: #1a1a1a; color: #eee; font: 14px monospace; padding: 16px; }
  canvas { background: #2a2a2a; image-rendering: pixelated; display: block; margin: 8px 0 24px; }
  h2 { margin: 16px 0 4px; color: #0f0; }
</style>
</head><body>
<h2>Tiny Dungeon — chars (rows 6-9, idx 72-119)</h2>
<canvas id="d_chars" width="1536" height="512"></canvas>
<h2>Tiny Dungeon — items/weapons (row 10, idx 120-131)</h2>
<canvas id="d_items" width="1536" height="128"></canvas>
<h2>Tiny Town — tiles (rows 0-5, idx 0-71)</h2>
<canvas id="t_tiles" width="1536" height="768"></canvas>
<script>
function drawSection(canvasId, src, startRow, endRow) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, c.width, c.height);
  const img = new Image();
  img.onload = () => {
    const cell = 128;
    for (let r = startRow; r <= endRow; r++) {
      for (let col = 0; col < 12; col++) {
        const idx = r * 12 + col;
        const dx = col * cell;
        const dy = (r - startRow) * cell;
        ctx.drawImage(img, col * 16, r * 16, 16, 16, dx, dy, 112, 112);
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(dx, dy + 96, 112, 24);
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('#' + idx, dx + 6, dy + 116);
      }
    }
  };
  img.src = src;
}
drawSection('d_chars', 'assets/sprites/dungeon.png', 6, 9);
drawSection('d_items', 'assets/sprites/dungeon.png', 10, 10);
drawSection('t_tiles', 'assets/sprites/town.png', 0, 5);
</script>
</body></html>
