<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Flappy Bird</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #1a1a2e;
      overflow: hidden; height: 100%;
      font-family: system-ui, sans-serif;
      touch-action: none;
    }
    #game { width: 100vw; height: 100vh; }
    #voltar {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.5); color: #fff;
      text-decoration: none; padding: 8px 14px;
      border-radius: 8px; font-size: 14px; z-index: 10;
    }
    #nickOverlay {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); z-index: 100;
      color: #fff; font-family: system-ui, sans-serif;
    }
    #nickOverlay.show { display: flex; }
    #nickBox {
      background: #1f2538; padding: 30px 26px; border-radius: 14px;
      max-width: 340px; width: 90%;
      border: 3px solid #4fdb9b; text-align: center;
    }
    #nickBox h2 { margin: 0 0 8px; font-size: 24px; color: #fff04f; }
    #nickBox p { margin: 6px 0; font-size: 14px; }
    #nickInput {
      width: 100%; box-sizing: border-box;
      padding: 12px 14px; font-size: 18px;
      border-radius: 8px; border: 2px solid #4fdb9b;
      background: #0d1322; color: #fff; outline: none;
      margin: 12px 0 4px;
    }
    #nickInput:focus { border-color: #fff04f; }
    #nickErro { color: #ff4f6f; min-height: 18px; font-size: 13px; }
    #nickBtn {
      background: #4fdb9b; color: #000; font-weight: bold;
      border: none; padding: 12px 28px; border-radius: 8px;
      font-size: 18px; cursor: pointer; margin-top: 6px;
    }
    #nickBtn:hover { background: #6ff5b3; }
    #trocarUser {
      position: fixed; top: 12px; right: 12px;
      background: rgba(0,0,0,0.5); color: #fff;
      border: none; padding: 8px 14px;
      border-radius: 8px; font-size: 14px; z-index: 10;
      cursor: pointer; display: none;
    }
    #trocarUser.show { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/shared/multiplayer.js"></script>
</head>
<body>
  <a id="voltar" href="../">← voltar</a>
  <button id="trocarUser" title="Trocar usuário">👤 trocar</button>
  <div id="game"></div>

  <div id="nickOverlay">
    <div id="nickBox">
      <h2>👋 Bem-vindo!</h2>
      <p>Escolhe seu nickname (3 a 20 letras, números ou _).</p>
      <input id="nickInput" type="text" maxlength="20" autocomplete="off" placeholder="ex: Pedro" />
      <p id="nickErro"></p>
      <button id="nickBtn">Entrar</button>
    </div>
  </div>

    // ====== Habilidades ======
    const HABILIDADES = [
      {
        slug: "shield_breaker",
        nome: "Shield Breaker",
        custo: 150,
        descricao: "Carrega em 10s. Aperte B (ou 💥) pra quebrar 3 paredes!",
        cooldown: 10000,
        paredesQuebradas: 3,
      },
      {

        nome: "Extra Life",

      },

    // ====== Sistema de usuários ======
    function carregarUsuarios() {
      try { return JSON.parse(localStorage.getItem("flappy_usuarios") || "{}"); }
      catch { return {}; }
    }
    function salvarUsuarios(u) { localStorage.setItem("flappy_usuarios", JSON.stringify(u)); }
    function getUsuarioAtual() { return localStorage.getItem("flappy_usuario_atual"); }
    function setUsuarioAtual(nick) { localStorage.setItem("flappy_usuario_atual", nick); }
    function existeUsuario(nick) {
      const u = carregarUsuarios();
      // Comparação case-insensitive: "Pedro" e "pedro" são duplicados
      const lower = nick.toLowerCase();
      return Object.keys(u).some(k => k.toLowerCase() === lower);
    }
    function criarUsuario(nick) {
      const u = carregarUsuarios();
      u[nick] = { recorde: 0, pontosTotal: 0, skinAtual: "blue", skinsCompradas: ["blue"],
                  habilidades: [], skinsDesbloqueadas: [], habilidadesDesbloqueadas: [],
                  vidasIniciais: 1, konamiUsado: false };
      salvarUsuarios(u);
      setUsuarioAtual(nick);
    }
    function carregarHabilidades() { return (dadosUsuario() || {}).habilidades || []; }
    function salvarHabilidades(arr) { atualizarUsuario({ habilidades: arr }); }
    function temHabilidade(slug) { return carregarHabilidades().includes(slug); }
    function carregarHabilidadesDesbloqueadas() { return (dadosUsuario() || {}).habilidadesDesbloqueadas || []; }
    function desbloquearHabilidade(slug) {
      const lista = carregarHabilidadesDesbloqueadas();
      if (!lista.includes(slug)) lista.push(slug);
      atualizarUsuario({ habilidadesDesbloqueadas: lista });
    }
    function carregarVidasIniciais() { return (dadosUsuario() || {}).vidasIniciais || 1; }
    function salvarVidasIniciais(v) { atualizarUsuario({ vidasIniciais: v }); }
    // Próxima vida custa: 50 * vidasIniciais (vida2=50, vida3=100, vida4=150...)
    function custoProximaVida() { return carregarVidasIniciais() * 50; }
    // Cor do coração baseada na posição (a cada 5 muda de cor)
    function corCoracao(idx) {
      const cores = ["❤️", "💙", "💛", "💚", "💜", "🖤", "🧡"];
      return cores[Math.floor((idx - 1) / 5) % cores.length];
    }
    // Konami / biblioteca secreta (uso infinito)
    function carregarSkinsDesbloqueadas() { return (dadosUsuario() || {}).skinsDesbloqueadas || []; }
    function desbloquearSkin(slug) {
      const lista = carregarSkinsDesbloqueadas();
      if (!lista.includes(slug)) lista.push(slug);
      atualizarUsuario({ skinsDesbloqueadas: lista });
    }
    // Helpers pra resolver textura/animação de skin (suporta variantes via texturaDe)
    function getSkinBase(s) {
      return s.texturaDe ? (SKINS.find(x => x.slug === s.texturaDe) || s) : s;
    }
    function getSkinTexKey(s) { return `skin_${(s.texturaDe || s.slug)}`; }
    function dadosUsuario() {
      const nick = getUsuarioAtual();
      const u = carregarUsuarios();
      const d = u[nick];
      if (d) {
        let mudou = false;
        if (!d.habilidades) { d.habilidades = []; mudou = true; }
        if (!d.skinsDesbloqueadas) { d.skinsDesbloqueadas = []; mudou = true; }
        if (!d.habilidadesDesbloqueadas) { d.habilidadesDesbloqueadas = []; mudou = true; }
        if (d.vidasIniciais === undefined) { d.vidasIniciais = 1; mudou = true; }
        if (d.konamiUsado === undefined) { d.konamiUsado = false; mudou = true; }
        if (mudou) salvarUsuarios(u);
      }
      return d || null;
    }
    function atualizarUsuario(mod) {
      const nick = getUsuarioAtual();
      const u = carregarUsuarios();
      if (!u[nick]) return;
      Object.assign(u[nick], mod);
      salvarUsuarios(u);
    }
    function recordeGlobalLocal() {
      const u = carregarUsuarios();
      let melhorN = 0, melhorNick = null;
      for (const [nick, d] of Object.entries(u)) {
        if ((d.recorde || 0) > melhorN) { melhorN = d.recorde; melhorNick = nick; }
      }
      return { pontos: melhorN, nick: melhorNick };
    }
    function recordeGlobalOnline() {
      if (!salaGlobal || !salaGlobal.lastState || !salaGlobal.lastState.recordes) return null;
      let melhorN = 0, melhorNick = null;
      for (const [nick, pontos] of Object.entries(salaGlobal.lastState.recordes)) {
        if (pontos > melhorN) { melhorN = pontos; melhorNick = nick; }
      }
      if (melhorNick === null) return null;
      return { pontos: melhorN, nick: melhorNick };
    }
    function recordeGlobal() {
      return recordeGlobalOnline() || recordeGlobalLocal();
    }
    function listaRanking(tipo) {
      // tipo: "recorde" (numa partida) ou "totais" (acumulado)
      const map = {};
      const locais = carregarUsuarios();
      for (const [nick, d] of Object.entries(locais)) {
        const v = tipo === "totais" ? (d.pontosTotal || 0) : (d.recorde || 0);
        if (v > 0) map[nick] = v;
      }
      const onlineKey = tipo === "totais" ? "totais" : "recordes";
      if (salaGlobal && salaGlobal.lastState && salaGlobal.lastState[onlineKey]) {
        for (const [nick, p] of Object.entries(salaGlobal.lastState[onlineKey])) {
          if (p > (map[nick] || 0)) map[nick] = p;
        }
      }
      return Object.entries(map)
        .map(([nick, pontos]) => ({ nick, pontos }))
        .sort((a, b) => b.pontos - a.pontos);
    }
    async function publicarOnline(nick, pontos, total) {
      if (!salaGlobal) return;
      try {
        const estado = salaGlobal.lastState || {};
        const recordesAtual = estado.recordes || {};
        const totaisAtual = estado.totais || {};
        const meuRecorde = recordesAtual[nick] || 0;
        const meuTotal = totaisAtual[nick] || 0;
        const novoRecorde = pontos > meuRecorde;
        const novoTotal = total > meuTotal;
        if (!novoRecorde && !novoTotal) return; // nada mudou
        const recordes = novoRecorde ? { ...recordesAtual, [nick]: pontos } : recordesAtual;
        const totais = novoTotal ? { ...totaisAtual, [nick]: total } : totaisAtual;
        // 1 único POST que atualiza ambos os campos juntos
        await salaGlobal.setState({ ...estado, recordes, totais });
      } catch (e) { /* offline */ }
    }
    // Wrappers que falam com o usuário atual
    function carregarPontosTotal() { return (dadosUsuario() || {}).pontosTotal || 0; }
    function salvarPontosTotal(v) { atualizarUsuario({ pontosTotal: v }); }
    function carregarMelhor() { return (dadosUsuario() || {}).recorde || 0; }
    function salvarMelhor(v) { atualizarUsuario({ recorde: v }); }
    function carregarSkinAtual() { return (dadosUsuario() || {}).skinAtual || "blue"; }
    function salvarSkinAtual(s) { atualizarUsuario({ skinAtual: s }); }
    function carregarSkinsCompradas() { return (dadosUsuario() || {}).skinsCompradas || ["blue"]; }
    function salvarSkinsCompradas(arr) { atualizarUsuario({ skinsCompradas: arr }); }

    function validarNick(nick) {
      nick = nick.trim();
      if (nick.length < 3) return "Mínimo 3 letras.";
      if (nick.length > 20) return "Máximo 20 letras.";
      if (!/^[A-Za-z0-9_]+$/.test(nick)) return "Só letras, números e _ (sem espaços).";
      if (existeUsuario(nick)) return "Esse nickname já existe. Escolhe outro.";
      return null;
    }

    // Migração: se já tinha pontos antigos (versão sem usuários), pergunta o nick e migra
    function tentarMigrarDadosAntigos() {
      const total = parseInt(localStorage.getItem("flappy_pontos_total"));
      const melhorAntigo = parseInt(localStorage.getItem("flappy_melhor"));
      if (!isNaN(total) || !isNaN(melhorAntigo)) {
        return {
          pontosTotal: isNaN(total) ? 0 : total,
          recorde: isNaN(melhorAntigo) ? 0 : melhorAntigo,
          skinAtual: localStorage.getItem("flappy_skin") || "blue",
          skinsCompradas: JSON.parse(localStorage.getItem("flappy_skins_compradas") || '["blue"]'),
        };
      }
      return null;
    }
    function limparDadosAntigos() {
      localStorage.removeItem("flappy_pontos_total");
      localStorage.removeItem("flappy_melhor");
      localStorage.removeItem("flappy_skin");
      localStorage.removeItem("flappy_skins_compradas");
    }

    // ====== Estado ======
    let bird;
    let canos;
    let chao;
    let fundoCeu;
    let nuvens = [];
    let pontos = 0;
    let pontosTotal = 0;
    let melhor = 0;
    let skinAtual = "blue";
    let skinsCompradas = ["blue"];
    let estado = "login"; // "login" | "menu" | "loja" | "jogando" | "fim"
    let textoPontos, telaMenu, telaLoja, textoFim;
    let textoMoedasMenu, textoNickBird;
    let cenaRef = null;
    let habilidades_compradas = []; // cache local
    // Estado da habilidade Shield Breaker
    let habCarga = 0;          // 0..1
    let habPronta = false;
    let habAtiva = false;
    let paredesParaQuebrar = 0;
    let teclaB;
    let barraHabBg, barraHabFill, textoHab, botaoHabilidade;
    // Extra Life
    let vidasAtuais = 1;
    let cargaVida = 0; // 0..1, regen em 5s
    let textoVidas; // texto que mostra os corações
    let invulnAte = 0; // tempo de invulnerabilidade pra não bater duas vezes
    let abaLojaAtual = "skins"; // "skins" | "habilidades"
    let salaGlobal = null;
    let cardRecordeRefs = null;
    let telaRanking = null;
    let abaRanking = "recorde"; // "recorde" | "totais"

    const config = {
      type: Phaser.AUTO,
      parent: "game",
      width: TELA_W, height: TELA_H,
      backgroundColor: "#4fa8db",
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: { preload, create, update },
    };

    window.__phaserGame_ref = new Phaser.Game(config);

    function preload() {
      SKINS.forEach(s => {
        if (s.texturaDe) return; // variantes reusam textura base
        if (s.frames > 1) {
          this.load.spritesheet(`skin_${s.slug}`, s.url, {
            frameWidth: s.w, frameHeight: s.h,
          });
        } else {
          this.load.image(`skin_${s.slug}`, s.url);
        }
      });
      this.load.image("fundoCeu", "/shared/assets/sprites/pixelfrog/pixel-adventure-1/Background/Blue.png");
      this.load.audio("pular", "/shared/assets/sounds/kenney/digital/Audio/pepSound1.ogg");
      this.load.audio("ponto", "/shared/assets/sounds/kenney/interface/Audio/confirmation_001.ogg");
      this.load.audio("bater", "/shared/assets/sounds/kenney/digital/Audio/lowDown.ogg");
      this.load.audio("comprar", "/shared/assets/sounds/kenney/interface/Audio/confirmation_004.ogg");
      this.load.audio("erro", "/shared/assets/sounds/kenney/interface/Audio/close_004.ogg");
    }

    function create() {
      const scene = this;

      // ===== Fundo =====
      fundoCeu = this.add.tileSprite(TELA_W / 2, TELA_H / 2, TELA_W, TELA_H, "fundoCeu").setDepth(0);
      desenharNuvens(this);

      // ===== Animações de cada skin (uma por textura base, variantes reusam) =====
      SKINS.forEach(s => {
        if (s.texturaDe) return;
        if (s.frames > 1) {
          this.anims.create({
            key: `anim_${s.slug}`,
            frames: this.anims.generateFrameNumbers(`skin_${s.slug}`, { start: 0, end: s.frames - 1 }),
            frameRate: s.fps,
            repeat: -1,
          });
        }
      });

      // ===== Pássaro (criado UMA vez; trocamos a textura quando muda skin) =====
      bird = this.physics.add.sprite(120, TELA_H / 2, `skin_${skinAtual}`);
      bird.body.allowGravity = false;
      bird.setDepth(5);
      aplicarSkinNoBird(this);

      // ===== Canos =====
      canos = this.physics.add.group();

      // ===== Chão =====
      chao = this.add.tileSprite(TELA_W / 2, TELA_H - CHAO_H / 2, TELA_W, CHAO_H, "fundoCeu");
      chao.setTint(0x7d5a3a);
      chao.setDepth(8);
      this.physics.add.existing(chao, true);
      const grama = this.add.rectangle(TELA_W / 2, TELA_H - CHAO_H, TELA_W, 8, 0x4fdb9b);
      grama.setDepth(8);

      // ===== Colisões =====
      this.physics.add.collider(bird, chao, () => bater(scene));
      this.physics.add.overlap(bird, canos, (_b, c) => {
        if (habAtiva && paredesParaQuebrar > 0 && !c.dataJaQuebrada) {
          // Quebra o par e desconta uma "parede" (par)
          c.dataJaQuebrada = true;
          if (c.dataPar) c.dataPar.dataJaQuebrada = true;
          if (c.dataPar) c.dataPar.destroy();
          c.destroy();
          paredesParaQuebrar--;
          scene.cameras.main.flash(150, 255, 220, 100); // flash dourado
          if (paredesParaQuebrar <= 0) desativarShieldBreaker(scene);
          return;
        }
        if (!c.dataJaQuebrada) bater(scene);
      });

      // ===== UI =====
      textoPontos = this.add.text(TELA_W / 2, 60, "0", {
        fontSize: "60px", color: "#ffffff", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 6,
      }).setOrigin(0.5).setDepth(20).setVisible(false);

      // ===== Texto do nickname acima do pássaro =====
      textoNickBird = this.add.text(0, 0, "", {
        fontSize: "12px", color: "#ffffff", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 3,
      }).setOrigin(0.5, 1).setDepth(6).setVisible(false);

      // ===== Barra da habilidade (parte inferior, acima do chão) =====
      const barraY = TELA_H - CHAO_H - 14;
      barraHabBg = this.add.rectangle(TELA_W / 2, barraY, 280, 14, 0x000000, 0.7)
        .setStrokeStyle(2, 0xffffff).setScrollFactor(0).setDepth(20).setVisible(false);
      barraHabFill = this.add.rectangle(TELA_W / 2 - 138, barraY, 0, 10, 0x4f9bff)
        .setOrigin(0, 0.5).setScrollFactor(0).setDepth(21).setVisible(false);
      textoHab = this.add.text(TELA_W / 2, barraY - 14, "", {
        fontSize: "11px", color: "#ffffff", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 2,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(21).setVisible(false);

      // ===== Texto de vidas (corações) — acima da barra =====
      textoVidas = this.add.text(TELA_W / 2, TELA_H - CHAO_H - 38, "", {
        fontSize: "16px", color: "#ffffff",
        stroke: "#000000", strokeThickness: 2,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(21).setVisible(false);

      // ===== Botão B (Shield Breaker) — só pra mobile =====
      botaoHabilidade = this.add.circle(TELA_W - 50, TELA_H - 130, 32, 0xfff04f, 0.9)
        .setStrokeStyle(3, 0xff8800).setScrollFactor(0).setDepth(25).setInteractive().setVisible(false);
      const txtBtnHab = this.add.text(TELA_W - 50, TELA_H - 130, "💥", { fontSize: "28px" })
        .setOrigin(0.5).setScrollFactor(0).setDepth(26);
      txtBtnHab.dataIsButtonLabel = true;
      botaoHabilidade.dataLabel = txtBtnHab;
      botaoHabilidade.on("pointerdown", () => {
        if (estado === "jogando" && habPronta && !habAtiva) ativarShieldBreaker(scene);
      });

      // ===== Input =====
      const acao = () => {
        if (estado === "menu" || estado === "fim") return;
        if (estado === "loja") return;
        if (estado === "jogando") {
          bird.body.velocity.y = PULO;
          scene.sound.play("pular", { volume: 0.4 });
          scene.tweens.add({ targets: bird, angle: -25, duration: 100 });
        }
      };
      this.input.keyboard.on("keydown-SPACE", acao);
      this.input.keyboard.on("keydown-UP", acao);
      this.input.on("pointerdown", (p) => {
        if (estado === "jogando") acao();
      });
      // Tecla B = ativar Shield Breaker
      this.input.keyboard.on("keydown-B", () => {
        if (estado === "jogando" && habPronta && !habAtiva) ativarShieldBreaker(scene);
      });

      // ===== Login =====
      cenaRef = this;

      // Conecta na sala global de recordes (polling 3s)
      try {
        salaGlobal = JPMultiplayer.join("FLAPPYRECORDS", {
          initialState: { recordes: {} },
          pollMs: 3000,
          onUpdate: () => {
            // Atualiza textos do card de recorde sem recarregar menu
            atualizarCardRecorde();
            // Se ranking está aberto, recarrega pra mostrar ao vivo
            if (telaRanking) {
              telaRanking.destroy();
              telaRanking = null;
              mostrarRanking(scene);
            }
          },
        });
      } catch (e) {
        console.warn("multiplayer offline:", e);
      }

      iniciarFluxoLogin(this);

      // ===== Konami Code listener =====
      iniciarKonami(this);
    }

    // ============================================
    // KONAMI CODE & BIBLIOTECA SECRETA
    // ============================================
    function iniciarKonami(scene) {
      const SEQ = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowRight","ArrowLeft","ArrowRight","ArrowLeft"];
      window.__konamiBuffer = [];
      window.__konamiAtivo = true;
      window.addEventListener("keydown", (e) => {
        if (estado === "jogando") return;
        window.__konamiBuffer.push(e.key);
        if (window.__konamiBuffer.length > SEQ.length) {
          window.__konamiBuffer = window.__konamiBuffer.slice(-SEQ.length);
        }
        if (window.__konamiBuffer.length === SEQ.length
            && window.__konamiBuffer.every((k, i) => k === SEQ[i])) {
          window.__konamiBuffer = [];
          mostrarCuboKonami(scene);
        }
      });
    }

    function mostrarCuboKonami(scene) {
      // Cubo preto com "?" no centro da tela, dura 3s
      const cubo = scene.add.rectangle(TELA_W / 2, TELA_H / 2, 120, 120, 0x000000, 0.95)
        .setStrokeStyle(4, 0xfff04f).setScrollFactor(0).setDepth(60).setInteractive();
      const txt = scene.add.text(TELA_W / 2, TELA_H / 2, "?", {
        fontSize: "70px", color: "#fff04f", fontStyle: "bold",
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61);

      // Pulse
      scene.tweens.add({
        targets: [cubo, txt], scale: 1.08, duration: 400,
        yoyo: true, repeat: -1, ease: "Sine.inOut",
      });

      // Auto-destroy em 3s
      const destruir = () => {
        if (cubo.active) {
          scene.tweens.killTweensOf([cubo, txt]);
          cubo.destroy(); txt.destroy();
        }
      };
      scene.time.delayedCall(3000, destruir);

      cubo.on("pointerdown", () => {
        scene.sound.play("comprar", { volume: 0.5 });
        destruir();
        mostrarBibliotecaSecreta(scene);
      });
    }

    let telaSecreta = null;
    let buscaSecreta = "";
    function mostrarBibliotecaSecreta(scene) {
      if (telaSecreta) telaSecreta.destroy();
      telaSecreta = scene.add.container(0, 0).setDepth(70);
      const fundo = scene.add.rectangle(TELA_W / 2, TELA_H / 2, TELA_W, TELA_H, 0x000022, 0.96);
      telaSecreta.add(fundo);

      const titulo = scene.add.text(TELA_W / 2, 25, "🎁 BIBLIOTECA SECRETA", {
        fontSize: "20px", color: "#fff04f", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 4,
      }).setOrigin(0.5);
      telaSecreta.add(titulo);

      const sub = scene.add.text(TELA_W / 2, 50,
        "Escolhe uma — ela vai pra sua loja por 50💰. Só pode escolher UMA.", {
        fontSize: "10px", color: "#aaaaaa", align: "center",
      }).setOrigin(0.5);
      telaSecreta.add(sub);

      // Input de busca (HTML overlay simples)
      const inputDom = document.createElement("input");
      inputDom.type = "text";
      inputDom.placeholder = "buscar (ex: animal, monstro, ninja...)";
      inputDom.value = buscaSecreta;
      inputDom.style.cssText = `
        position: fixed; left: 50%; top: 80px; transform: translateX(-50%);
        width: 280px; padding: 8px 12px; font-size: 14px; z-index: 100;
        background: #0d1322; color: #fff; border: 2px solid #4fdb9b;
        border-radius: 8px; outline: none;
      `;
      document.body.appendChild(inputDom);
      setTimeout(() => inputDom.focus(), 50);
      const onInput = () => {
        buscaSecreta = inputDom.value.toLowerCase();
        renderGrid();
      };
      inputDom.addEventListener("input", onInput);
      telaSecreta.dataInput = inputDom;

      // Área visível (mask) e container scrollável
      const viewportY = 105, viewportH = TELA_H - 105 - 60;
      const mask = scene.make.graphics({ x: 0, y: 0, add: false });
      mask.fillStyle(0xffffff);
      mask.fillRect(0, viewportY, TELA_W, viewportH);
      const gridContainer = scene.add.container(0, 0);
      gridContainer.setMask(mask.createGeometryMask());
      telaSecreta.add(gridContainer);

      let scrollY = 0;
      let scrollMax = 0;

      function aplicarScroll(dy) {
        scrollY = Phaser.Math.Clamp(scrollY + dy, -scrollMax, 0);
        gridContainer.y = scrollY;
      }

      function renderGrid() {
        gridContainer.removeAll(true);
        scrollY = 0; gridContainer.y = 0;
        const desbloqueadas = carregarSkinsDesbloqueadas();
        const habsDesb = carregarHabilidadesDesbloqueadas();
        const candSkins = SKINS.filter(s => s.oculto && !desbloqueadas.includes(s.slug))
          .map(s => ({ tipo: "skin", item: s }));
        const candHabs = HABILIDADES.filter(h => h.oculta && !habsDesb.includes(h.slug))
          .map(h => ({ tipo: "habilidade", item: h }));
        const todas = [...candSkins, ...candHabs];
        const filtro = buscaSecreta.trim();
        const visiveis = filtro
          ? todas.filter(({ item }) =>
              item.nome.toLowerCase().includes(filtro) ||
              (item.categoria && item.categoria.toLowerCase().includes(filtro)) ||
              item.slug.toLowerCase().includes(filtro))
          : candSkins; // sem filtro: só skins (habilidades ocultas só aparecem com busca)

        if (visiveis.length === 0) {
          const t = scene.add.text(TELA_W / 2, viewportY + viewportH / 2, "Nenhuma skin encontrada", {
            fontSize: "14px", color: "#aaaaaa",
          }).setOrigin(0.5);
          gridContainer.add(t);
          return;
        }

        const cols = 3;
        const cellW = 120, cellH = 100;
        const gridX = TELA_W / 2 - (cols * cellW) / 2 + cellW / 2;
        const gridY = viewportY + 25;
        visiveis.forEach((entry, i) => {
          const item = entry.item;
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = gridX + col * cellW;
          const y = gridY + row * cellH;
          const ehHab = entry.tipo === "habilidade";
          const card = scene.add.rectangle(x, y, cellW - 8, cellH - 8, 0x222244, 0.95)
            .setStrokeStyle(2, ehHab ? 0xfff04f : 0x4fdb9b).setInteractive();
          gridContainer.add(card);
          if (ehHab) {
            const ic = scene.add.text(x, y - 10, "❤️", { fontSize: "30px" }).setOrigin(0.5);
            gridContainer.add(ic);
          } else {
            const baseS = getSkinBase(item);
            const sp = scene.add.sprite(x, y - 10, `skin_${baseS.slug}`);
            const escMax = Math.min(40 / baseS.w, 40 / baseS.h, 1.4);
            sp.setScale(escMax);
            if (baseS.frames > 1) sp.play(`anim_${baseS.slug}`);
            if (item.tint) sp.setTint(item.tint);
            gridContainer.add(sp);
          }
          const nome = scene.add.text(x, y + 28, item.nome, {
            fontSize: "11px", color: "#ffffff", fontStyle: "bold",
          }).setOrigin(0.5);
          gridContainer.add(nome);
          const cat = scene.add.text(x, y + 42, item.categoria || "", {
            fontSize: "9px", color: ehHab ? "#fff04f" : "#aaaaaa",
          }).setOrigin(0.5);
          gridContainer.add(cat);

          card.on("pointerdown", () => {
            scene.sound.play("comprar", { volume: 0.6 });
            if (ehHab) desbloquearHabilidade(item.slug);
            else desbloquearSkin(item.slug);
            scene.cameras.main.flash(300, 255, 215, 0);
            fecharBibliotecaSecreta();
          });
        });

        // Calcula scroll máximo (quanto pode descer)
        const totalRows = Math.ceil(visiveis.length / cols);
        const totalH = totalRows * cellH + 30;
        scrollMax = Math.max(0, totalH - viewportH);
      }
      renderGrid();

      // === Scroll: mouse wheel + drag ===
      const wheelHandler = (e) => {
        if (!telaSecreta) return;
        e.preventDefault();
        aplicarScroll(-e.deltaY);
      };
      window.addEventListener("wheel", wheelHandler, { passive: false });
      telaSecreta.dataWheelHandler = wheelHandler;

      // Drag (mobile/touch)
      let arrastando = false, ultY = 0;
      scene.input.on("pointerdown", (p) => {
        if (telaSecreta && p.y > viewportY) {
          arrastando = true; ultY = p.y;
        }
      }, telaSecreta);
      scene.input.on("pointermove", (p) => {
        if (arrastando && telaSecreta) {
          aplicarScroll(p.y - ultY);
          ultY = p.y;
        }
      }, telaSecreta);
      scene.input.on("pointerup", () => { arrastando = false; }, telaSecreta);

      // Botão fechar
      const btn = scene.add.rectangle(TELA_W / 2, TELA_H - 30, 160, 38, 0x4f9bff, 1)
        .setInteractive().setStrokeStyle(3, 0x000000);
      const t = scene.add.text(TELA_W / 2, TELA_H - 30, "Cancelar", {
        fontSize: "14px", color: "#ffffff", fontStyle: "bold",
      }).setOrigin(0.5);
      btn.on("pointerdown", () => {
        scene.sound.play("ponto", { volume: 0.4 });
        fecharBibliotecaSecreta();
      });
      telaSecreta.add(btn); telaSecreta.add(t);
    }

    function fecharBibliotecaSecreta() {
      if (telaSecreta) {
        if (telaSecreta.dataInput) telaSecreta.dataInput.remove();
        if (telaSecreta.dataWheelHandler) {
          window.removeEventListener("wheel", telaSecreta.dataWheelHandler);
        }
        telaSecreta.destroy();
        telaSecreta = null;
      }
    }

    function iniciarFluxoLogin(scene) {
      const nick = getUsuarioAtual();
      const usuarios = carregarUsuarios();
      // Se tem usuário atual válido → carrega e mostra menu
      if (nick && usuarios[nick]) {
        carregarDadosDoUsuarioAtual();
        aplicarSkinNoBird(scene);
        document.getElementById("trocarUser").classList.add("show");
        document.getElementById("trocarUser").textContent = `👤 ${nick}`;
        mostrarMenu(scene);
        return;
      }
      // Senão, mostra overlay
      mostrarOverlayLogin(scene);
    }

    function carregarDadosDoUsuarioAtual() {
      pontosTotal = carregarPontosTotal();
      melhor = carregarMelhor();
      skinAtual = carregarSkinAtual();
      skinsCompradas = carregarSkinsCompradas();
    }

    function mostrarOverlayLogin(scene) {
      estado = "login";
      const overlay = document.getElementById("nickOverlay");
      const input = document.getElementById("nickInput");
      const erro = document.getElementById("nickErro");
      const btn = document.getElementById("nickBtn");
      const migrado = tentarMigrarDadosAntigos();
      if (migrado) {
        erro.textContent = "(seus pontos antigos vão pra esse nickname)";
        erro.style.color = "#fff04f";
      } else {
        erro.textContent = "";
        erro.style.color = "#ff4f6f";
      }
      input.value = "";
      overlay.classList.add("show");
      setTimeout(() => input.focus(), 50);

      const submit = () => {
        const nick = input.value.trim();
        const msg = validarNick(nick);
        if (msg) {
          erro.textContent = msg;
          erro.style.color = "#ff4f6f";
          return;
        }
        // Cria usuário (com dados antigos migrados se houver)
        criarUsuario(nick);
        if (migrado) {
          atualizarUsuario(migrado);
          limparDadosAntigos();
        }
        carregarDadosDoUsuarioAtual();
        aplicarSkinNoBird(scene);
        overlay.classList.remove("show");
        document.getElementById("trocarUser").classList.add("show");
        document.getElementById("trocarUser").textContent = `👤 ${nick}`;
        btn.removeEventListener("click", submit);
        input.removeEventListener("keydown", onEnter);
        mostrarMenu(scene);
      };
      const onEnter = (e) => { if (e.key === "Enter") submit(); };
      btn.addEventListener("click", submit);
      input.addEventListener("keydown", onEnter);
    }

    // Botão "trocar usuário" — fecha sessão e abre login
    document.getElementById("trocarUser").addEventListener("click", () => {
      if (estado === "jogando") return; // não troca no meio da partida
      localStorage.removeItem("flappy_usuario_atual");
      // Reseta estado em memória
      pontosTotal = 0; melhor = 0; skinAtual = "blue"; skinsCompradas = ["blue"];
      // Limpa menu/loja
      if (telaMenu) { telaMenu.destroy(); telaMenu = null; }
      if (telaLoja) { telaLoja.destroy(); telaLoja = null; }
      if (textoFim) { textoFim.destroy(); textoFim = null; }
      document.getElementById("trocarUser").classList.remove("show");
      mostrarOverlayLogin(cenaRef);
    });

    function aplicarSkinNoBird(scene) {
      const skin = SKINS.find(s => s.slug === skinAtual && s.custo >= 0) || SKINS[0];
      const base = getSkinBase(skin);
      bird.setTexture(`skin_${base.slug}`);
      bird.setScale(skin.escala || base.escala);
      const hbW = Math.floor(base.w * 0.65);
      const hbH = Math.floor(base.h * 0.55);
      bird.setSize(hbW, hbH);
      if (base.frames > 1) bird.play(`anim_${base.slug}`);
      else if (bird.anims) bird.anims.stop();
      if (skin.tint) bird.setTint(skin.tint);
      else bird.clearTint();
    }

    // ============================================
    // MENU PRINCIPAL
    // ============================================
    function mostrarMenu(scene) {
      estado = "menu";
      if (telaMenu) telaMenu.destroy();
      telaMenu = scene.add.container(0, 0).setDepth(30);

      const fundo = scene.add.rectangle(TELA_W / 2, TELA_H / 2, TELA_W, TELA_H, 0x000000, 0.45);
      telaMenu.add(fundo);

      const titulo = scene.add.text(TELA_W / 2, 90, "🐦 FLAPPY BIRD", {
        fontSize: "32px", color: "#ffffff", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 5,
      }).setOrigin(0.5);
      telaMenu.add(titulo);

      // Mostra moedas
      textoMoedasMenu = scene.add.text(TELA_W / 2, 145,
        `💰 ${pontosTotal} pontos`, {
        fontSize: "20px", color: "#fff04f", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 3,
      }).setOrigin(0.5);
      telaMenu.add(textoMoedasMenu);

      // Skin atual em destaque
      const skin = SKINS.find(s => s.slug === skinAtual) || SKINS[0];

    // ============================================
    // LOJA (com abas)
    // ============================================
    function mostrarLoja(scene) {
      estado = "loja";
      if (telaLoja) fecharLoja(scene);
      telaLoja = scene.add.container(0, 0).setDepth(30);

      const fundo = scene.add.rectangle(TELA_W / 2, TELA_H / 2, TELA_W, TELA_H, 0x000000, 0.7);
      telaLoja.add(fundo);

      const titulo = scene.add.text(TELA_W / 2, 25, "🛒 LOJA", {
        fontSize: "22px", color: "#fff04f", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 4,
      }).setOrigin(0.5);
      telaLoja.add(titulo);

      const txtMoedas = scene.add.text(TELA_W / 2, 53, `💰 ${pontosTotal} pontos`, {
        fontSize: "16px", color: "#ffffff", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 3,
      }).setOrigin(0.5);
      telaLoja.add(txtMoedas);

      // ===== Abas =====
      const abaY = 90;
      const criarAba = (nome, slug, x, ativa) => {
        const cor = ativa ? 0xfff04f : 0x444466;
        const corTxt = ativa ? "#000" : "#ffffff";
        const r = scene.add.rectangle(x, abaY, 140, 36, cor, 1).setInteractive().setStrokeStyle(2, 0x000000);
        const t = scene.add.text(x, abaY, nome, { fontSize: "14px", color: corTxt, fontStyle: "bold" }).setOrigin(0.5);
        r.on("pointerdown", () => {
          if (abaLojaAtual === slug) return;
          abaLojaAtual = slug;
          scene.sound.play("ponto", { volume: 0.3 });
          telaLoja.destroy();
          telaLoja = null;
          mostrarLoja(scene);
        });
        telaLoja.add(r); telaLoja.add(t);
      };
      const temEL = temHabilidade("extra_life");
      if (temEL) {
        criarAba("👕 SKINS",       "skins",       TELA_W / 2 - 130, abaLojaAtual === "skins");
        criarAba("⚡ HABS",         "habilidades", TELA_W / 2,       abaLojaAtual === "habilidades");
        criarAba("❤️ VIDAS",       "vidas",       TELA_W / 2 + 130, abaLojaAtual === "vidas");
      } else {
        criarAba("👕 SKINS",       "skins",       TELA_W / 2 - 75,  abaLojaAtual === "skins");
        criarAba("⚡ HABILIDADES", "habilidades", TELA_W / 2 + 75,  abaLojaAtual === "habilidades");
      }

      // ===== Viewport scrollável =====
      const viewportY = 115;
      const viewportH = TELA_H - viewportY - 60;
      const mask = scene.make.graphics({ x: 0, y: 0, add: false });
      mask.fillStyle(0xffffff);
      mask.fillRect(0, viewportY, TELA_W, viewportH);
      const scrollable = scene.add.container(0, 0);
      scrollable.setMask(mask.createGeometryMask());
      telaLoja.add(scrollable);
      telaLoja.dataScrollable = scrollable;
      telaLoja.dataScrollY = 0;
      telaLoja.dataScrollMax = 0;

      // ===== Conteúdo conforme aba =====
      if (abaLojaAtual === "skins") renderSkinsLoja(scene, scrollable);
      else if (abaLojaAtual === "vidas") renderVidasLoja(scene, scrollable);
      else renderHabilidadesLoja(scene, scrollable);

      // === Scroll: mouse wheel + drag ===
      const aplicarScroll = (dy) => {
        telaLoja.dataScrollY = Phaser.Math.Clamp(telaLoja.dataScrollY + dy, -telaLoja.dataScrollMax, 0);
        scrollable.y = telaLoja.dataScrollY;
      };
      const wheelHandler = (e) => {
        if (!telaLoja) return;
        // dy positivo = roda pra baixo → scroll pra baixo (subtrai do y)
        aplicarScroll(-e.deltaY);
        e.preventDefault();
      };
      window.addEventListener("wheel", wheelHandler, { passive: false });
      telaLoja.dataWheelHandler = wheelHandler;

      // Drag (mobile/touch)
      let arrastando = false, ultY = 0;
      const lojaPdown = (p) => { if (telaLoja && p.y > viewportY && p.y < viewportY + viewportH) { arrastando = true; ultY = p.y; } };
      const lojaPmove = (p) => { if (arrastando && telaLoja) { aplicarScroll(p.y - ultY); ultY = p.y; } };
      const lojaPup = () => { arrastando = false; };
      scene.input.on("pointerdown", lojaPdown);
      scene.input.on("pointermove", lojaPmove);
      scene.input.on("pointerup", lojaPup);
      telaLoja.dataInputHandlers = { down: lojaPdown, move: lojaPmove, up: lojaPup };

      // Botão voltar
      const btnVoltar = scene.add.rectangle(TELA_W / 2, TELA_H - 30, 160, 38, 0x4f9bff, 1)
        .setInteractive().setStrokeStyle(3, 0x000000);
      const txtVoltar = scene.add.text(TELA_W / 2, TELA_H - 30, "← Voltar", {
        fontSize: "16px", color: "#ffffff", fontStyle: "bold",
      }).setOrigin(0.5);
      btnVoltar.on("pointerdown", () => {
        scene.sound.play("ponto", { volume: 0.4 });
        fecharLoja(scene);
        aplicarSkinNoBird(scene);
        mostrarMenu(scene);
      });
      telaLoja.add(btnVoltar);
      telaLoja.add(txtVoltar);
    }

    function fecharLoja(scene) {
      if (!telaLoja) return;
      if (telaLoja.dataWheelHandler) {
        window.removeEventListener("wheel", telaLoja.dataWheelHandler);
      }
      if (telaLoja.dataInputHandlers) {
        const h = telaLoja.dataInputHandlers;
        scene.input.off("pointerdown", h.down);
        scene.input.off("pointermove", h.move);
        scene.input.off("pointerup", h.up);
      }
      telaLoja.destroy();
      telaLoja = null;
    }

    function renderSkinsLoja(scene, scrollable) {
      const startY = 135;
      const itemH = 60;
      const desbloqueadas = carregarSkinsDesbloqueadas();
      const compraveis = SKINS.filter(s =>
        s.custo >= 0 && (!s.oculto || desbloqueadas.includes(s.slug))
      );
      compraveis.forEach((s, i) => {
        const y = startY + i * itemH;
        const card = scene.add.rectangle(TELA_W / 2, y, 370, itemH - 8, 0x222244, 0.95)
          .setStrokeStyle(2, 0xffffff);
        scrollable.add(card);

        const baseS = getSkinBase(s);
        const ic = scene.add.sprite(TELA_W / 2 - 150, y, `skin_${baseS.slug}`);
        ic.setScale((s.escala || baseS.escala) * 0.7);
        if (baseS.frames > 1) ic.play(`anim_${baseS.slug}`);
        if (s.tint) ic.setTint(s.tint);
        scrollable.add(ic);

        const txtNome = scene.add.text(TELA_W / 2 - 100, y - 8, s.nome, {
          fontSize: "14px", color: "#ffffff", fontStyle: "bold",
        }).setOrigin(0, 0.5);
        scrollable.add(txtNome);

        const possui = skinsCompradas.includes(s.slug);
        const equipada = skinAtual === s.slug;
        let textoStatus, corStatus;
        if (equipada) { textoStatus = "✓ EQUIPADA"; corStatus = "#4fdb9b"; }
        else if (possui) { textoStatus = "Equipar"; corStatus = "#4f9bff"; }
        else { textoStatus = `💰 ${s.custo}`; corStatus = pontosTotal >= s.custo ? "#fff04f" : "#aaaaaa"; }

        const txtStatus = scene.add.text(TELA_W / 2 + 110, y, textoStatus, {
          fontSize: "14px", color: corStatus, fontStyle: "bold",
        }).setOrigin(0.5);
        scrollable.add(txtStatus);

        card.setInteractive();
        card.on("pointerdown", () => {
          if (equipada) return;
          if (possui) {
            skinAtual = s.slug;
            salvarSkinAtual(skinAtual);
            scene.sound.play("comprar", { volume: 0.5 });
            mostrarLoja(scene);
          } else if (pontosTotal >= s.custo) {
            pontosTotal -= s.custo;
            salvarPontosTotal(pontosTotal);
            skinsCompradas.push(s.slug);
            salvarSkinsCompradas(skinsCompradas);
            skinAtual = s.slug;
            salvarSkinAtual(skinAtual);
            scene.sound.play("comprar", { volume: 0.6 });
            mostrarLoja(scene);
          } else {
            scene.sound.play("erro", { volume: 0.5 });
            scene.tweens.add({ targets: card, x: TELA_W / 2 + 8, duration: 60, yoyo: true, repeat: 3, onComplete: () => card.x = TELA_W / 2 });
          }
        });
      });
      // Calcula scrollMax
      const totalH = startY + compraveis.length * itemH + 20;
      const viewportH = TELA_H - 115 - 60;
      telaLoja.dataScrollMax = Math.max(0, totalH - 115 - viewportH);
    }

      telaLoja.dataScrollMax = Math.max(0, totalH - 115 - viewportH);
    }

    // ============================================
    // PARTIDA
    // ============================================
    function iniciarPartida(scene) {
      if (telaMenu) { telaMenu.destroy(); telaMenu = null; }
      if (textoFim) { textoFim.destroy(); textoFim = null; }
      pontos = 0;
      textoPontos.setText("0").setVisible(true);
      // Limpa paredes antigas
      canos.clear(true, true);
      // Atualiza skin e reposiciona pássaro
      aplicarSkinNoBird(scene);
      bird.setPosition(120, TELA_H / 2);
      bird.angle = 0;
      bird.clearTint();
      bird.setVisible(true);
      bird.body.allowGravity = true;
      scene.physics.world.gravity.y = GRAVIDADE;
      bird.body.velocity.y = PULO;
      scene.sound.play("pular", { volume: 0.4 });
      // Nickname acima do bird, escala proporcional à skin
      const skin = SKINS.find(s => s.slug === skinAtual) || SKINS[0];
      textoNickBird.setText(getUsuarioAtual() || "");
      const tam = Math.round(10 + skin.escala * 4);
      textoNickBird.setStyle({ fontSize: `${tam}px`, color: "#ffffff", fontStyle: "bold", stroke: "#000000", strokeThickness: 3 });
      textoNickBird.setVisible(true);

      // Reset habilidades
      habCarga = 0;
      habPronta = false;
      habAtiva = false;
      paredesParaQuebrar = 0;
      const temSB = temHabilidade("shield_breaker");
      barraHabBg.setVisible(temSB);
      barraHabFill.setVisible(temSB);
      textoHab.setVisible(temSB);

      // Extra Life
      vidasAtuais = carregarVidasIniciais();
      cargaVida = 0;
      invulnAte = 0;
      const temEL = temHabilidade("extra_life");
      textoVidas.setVisible(temEL || vidasAtuais > 1);
      atualizarTextoVidas();

      estado = "jogando";
    }

    function atualizarTextoVidas() {
      // Renderiza N corações; até 10 em fila, depois "❤️ x N"
      if (vidasAtuais <= 0) { textoVidas.setText(""); return; }
      if (vidasAtuais > 10) {
        const cor = corCoracao(vidasAtuais);
        textoVidas.setText(`${cor} x ${vidasAtuais}`);
      } else {
        let s = "";
        for (let i = 1; i <= vidasAtuais; i++) s += corCoracao(i);
        textoVidas.setText(s);
      }
    }

    function update(_, deltaMs) {
      const scene = this;
      const dt = deltaMs / 1000;

      // Parallax: fundo bem devagar, nuvens média, chão rápido
      // (mexem sempre — até no menu — pra dar movimento na tela)
      fundoCeu.tilePositionX += 12 * dt;
      nuvens.forEach(n => {
        n.x -= n.dataVel * dt;
        if (n.x < -40) n.x = TELA_W + 40;
      });
      if (estado === "jogando") chao.tilePositionX += 100 * dt;

      if (estado !== "jogando") return;

      const v = bird.body.velocity.y;
      const ang = Phaser.Math.Clamp(v / 8, -25, 90);
      bird.angle += (ang - bird.angle) * 0.08;

      // Nickname acompanha o bird (proporcional ao tamanho da skin)
      if (textoNickBird.visible) {
        const skin = SKINS.find(s => s.slug === skinAtual) || SKINS[0];
        const alturaSkin = skin.h * skin.escala;
        textoNickBird.setPosition(bird.x, bird.y - alturaSkin / 2 - 4);
      }

      canos.children.iterate(c => {
        if (!c) return;
        if (c.x < -LARGURA_CANO) { c.destroy(); return; }
        if (!c.dataPontuou && c.x < bird.x - 5 && c.dataParCima) {
          c.dataPontuou = true;
          pontos++;
          pontosTotal++;
          salvarPontosTotal(pontosTotal);
          textoPontos.setText(pontos);
          scene.sound.play("ponto", { volume: 0.5 });
        }
      });

      if (canos.children.size === 0
          || canos.children.entries[canos.children.entries.length - 1].x < TELA_W - ESPACO_CANOS) {
        spawnarCanos(scene);
      }

      if (bird.y < -20) bird.body.velocity.y = 50;

      // === Habilidade Shield Breaker ===
      if (temHabilidade("shield_breaker") && !habAtiva) {
        habCarga = Math.min(1, habCarga + dt / 10);
        if (habCarga >= 1) habPronta = true;
      }

      // === Habilidade Extra Life — carrega 5s, +1 vida ===
      if (temHabilidade("extra_life")) {
        cargaVida += dt / 5;
        if (cargaVida >= 1) {
          cargaVida = 0;
          vidasAtuais++;
          atualizarTextoVidas();
          // Pequeno feedback visual
          scene.tweens.add({ targets: textoVidas, scale: 1.4, duration: 120, yoyo: true });
        }
      }
      // Atualiza barra
      const habW = 276;
      barraHabFill.width = habCarga * habW;
      if (habAtiva) {
        textoHab.setText(`💥 SHIELD BREAKER ATIVO — ${paredesParaQuebrar} restantes`);
        barraHabFill.fillColor = 0xffd700;
        barraHabFill.width = (paredesParaQuebrar / 3) * habW;
      } else if (habPronta) {
        textoHab.setText("🔥 PRESSIONE B (ou toque no 💥)");
        barraHabFill.fillColor = 0x4fdb9b;
      } else if (temHabilidade("shield_breaker")) {
        textoHab.setText(`Shield Breaker: ${Math.round(habCarga * 100)}%`);
        barraHabFill.fillColor = 0x4f9bff;
      }

      // Mostra/esconde botão de habilidade no mobile
      const mostrarBotaoHab = temHabilidade("shield_breaker") && habPronta && !habAtiva;
      botaoHabilidade.setVisible(mostrarBotaoHab);
      if (botaoHabilidade.dataLabel) botaoHabilidade.dataLabel.setVisible(mostrarBotaoHab);
    }

    function spawnarCanos(scene) {
      const margem = 70;
      const minY = margem + GAP_CANO / 2;
      const maxY = TELA_H - CHAO_H - margem - GAP_CANO / 2;
      const centroGap = Phaser.Math.Between(minY, maxY);
      const x = TELA_W + LARGURA_CANO / 2;

      const alturaCima = centroGap - GAP_CANO / 2;
      const alturaBaixo = TELA_H - CHAO_H - (centroGap + GAP_CANO / 2);

      // Parede de cima
      const paredeCima = scene.add.rectangle(x, alturaCima / 2, LARGURA_CANO, alturaCima, 0x8a6a4a);
      paredeCima.setStrokeStyle(4, 0x4a3520);
      scene.physics.add.existing(paredeCima);
      paredeCima.dataParCima = true;
      paredeCima.dataPontuou = false;
      canos.add(paredeCima);
      // Setar AQUI (depois do group.add) — caso contrário o group reseta o body
      paredeCima.body.setAllowGravity(false);
      paredeCima.body.setVelocity(VEL_CANO, 0);

      // Parede de baixo
      const yBaixo = TELA_H - CHAO_H - alturaBaixo / 2;
      const paredeBaixo = scene.add.rectangle(x, yBaixo, LARGURA_CANO, alturaBaixo, 0x8a6a4a);
      paredeBaixo.setStrokeStyle(4, 0x4a3520);
      scene.physics.add.existing(paredeBaixo);
      canos.add(paredeBaixo);
      paredeBaixo.body.setAllowGravity(false);
      paredeBaixo.body.setVelocity(VEL_CANO, 0);

      // Liga as duas paredes (pra Shield Breaker quebrar o par junto)
      paredeCima.dataPar = paredeBaixo;
      paredeBaixo.dataPar = paredeCima;
    }

    // ============================================
    // HABILIDADE: SHIELD BREAKER
    // ============================================
    function ativarShieldBreaker(scene) {
      habAtiva = true;
      habPronta = false;
      habCarga = 0;
      paredesParaQuebrar = 3;
      // Aplica skin Goku temporária
      aplicarSkinNoBirdComOverride("goku");
      scene.cameras.main.flash(200, 255, 215, 0);
      scene.sound.play("comprar", { volume: 0.6 });
    }

    function desativarShieldBreaker(scene) {
      habAtiva = false;
      paredesParaQuebrar = 0;
      // Volta pra skin original
      aplicarSkinNoBird(scene);
    }

    function aplicarSkinNoBirdComOverride(slug) {
      const skin = SKINS.find(s => s.slug === slug) || SKINS[0];
      const base = getSkinBase(skin);
      bird.setTexture(`skin_${base.slug}`);
      bird.setScale(skin.escala || base.escala);
      const hbW = Math.floor(base.w * 0.65);
      const hbH = Math.floor(base.h * 0.55);
      bird.setSize(hbW, hbH);
      if (base.frames > 1) bird.play(`anim_${base.slug}`);
      if (skin.tint) bird.setTint(skin.tint);
      else bird.clearTint();
    }

    function bater(scene) {
      if (estado !== "jogando") return;
      // Se tem vidas sobrando, perde uma e continua
      if (vidasAtuais > 1 && scene.time.now > invulnAte) {
        vidasAtuais--;
        invulnAte = scene.time.now + 800; // 0.8s de invulnerabilidade pra não bater de novo
        atualizarTextoVidas();
        scene.sound.play("bater", { volume: 0.4 });
        scene.cameras.main.flash(150, 255, 100, 100);
        // Pequeno empurrão pra cima pra escapar do obstáculo
        bird.body.velocity.y = PULO * 0.7;
        // Piscando pra mostrar invulnerabilidade
        scene.tweens.add({ targets: bird, alpha: 0.3, duration: 100, yoyo: true, repeat: 3, onComplete: () => bird.alpha = 1 });
        return;
      }
      // Sem vidas → morre de verdade
      estado = "fim";
      // Garante reset da habilidade visual (volta pra skin normal)
      if (habAtiva) {
        habAtiva = false;
        paredesParaQuebrar = 0;
      }
      barraHabBg.setVisible(false);
      barraHabFill.setVisible(false);
      textoHab.setVisible(false);
      textoVidas.setVisible(false);
      botaoHabilidade.setVisible(false);
      if (botaoHabilidade.dataLabel) botaoHabilidade.dataLabel.setVisible(false);
      scene.sound.play("bater", { volume: 0.6 });
      if (bird.anims) bird.anims.stop();
      bird.setTint(0xff8888);
      canos.children.iterate(c => { if (c && c.body) c.body.setVelocityX(0); });

      let novoRecorde = false;
      if (pontos > melhor) {
        melhor = pontos;
        salvarMelhor(melhor);
        novoRecorde = true;
      }
      // Publica recorde + total juntos num único POST (evita race condition)
      publicarOnline(getUsuarioAtual(), pontos, pontosTotal);

      const tit = novoRecorde ? "🏆 NOVO RECORDE!" : "💥 GAME OVER";
      textoFim = scene.add.container(0, 0).setDepth(50);
      const fundo = scene.add.rectangle(TELA_W / 2, TELA_H / 2, TELA_W, TELA_H, 0x000000, 0.65);
      textoFim.add(fundo);
      const txt = scene.add.text(TELA_W / 2, TELA_H / 2 - 60,
        `${tit}\n\nPontos: ${pontos}\nMelhor: ${melhor}\n💰 Total: ${pontosTotal}`, {
        fontSize: "20px", color: "#ffffff", align: "center", fontStyle: "bold",
        stroke: "#000000", strokeThickness: 4,
      }).setOrigin(0.5);
      textoFim.add(txt);

      const btnRej = scene.add.rectangle(TELA_W / 2, TELA_H / 2 + 80, 200, 50, 0x4fdb9b, 1)
        .setInteractive().setStrokeStyle(3, 0x000000);
      const txtRej = scene.add.text(TELA_W / 2, TELA_H / 2 + 80, "▶ Jogar de novo", {
        fontSize: "18px", color: "#000000", fontStyle: "bold",
      }).setOrigin(0.5);
      btnRej.on("pointerdown", () => {
        scene.sound.play("ponto", { volume: 0.4 });
        textoFim.destroy(); textoFim = null;
        iniciarPartida(scene);
      });
      textoFim.add(btnRej); textoFim.add(txtRej);

      const btnMenu = scene.add.rectangle(TELA_W / 2, TELA_H / 2 + 145, 200, 44, 0xfff04f, 1)
        .setInteractive().setStrokeStyle(3, 0x000000);
      const txtMenu = scene.add.text(TELA_W / 2, TELA_H / 2 + 145, "🛒 Loja / Menu", {
        fontSize: "16px", color: "#000000", fontStyle: "bold",
      }).setOrigin(0.5);
      btnMenu.on("pointerdown", () => {
        scene.sound.play("ponto", { volume: 0.4 });
        textoFim.destroy(); textoFim = null;
        textoPontos.setVisible(false);
        textoNickBird.setVisible(false);
        canos.children.iterate(c => { if (c) c.destroy(); });
        canos.clear(true, true);
        bird.setVisible(false);
        mostrarMenu(scene);
      });
      textoFim.add(btnMenu); textoFim.add(txtMenu);
    }

    function desenharNuvens(scene) {
      // Cria textura de nuvem uma vez
      if (!scene.textures.exists("nuvem")) {
        const g = scene.add.graphics();
        g.fillStyle(0xffffff, 0.85);
        g.fillCircle(20, 20, 14);
        g.fillCircle(34, 14, 12);
        g.fillCircle(48, 20, 14);
        g.fillCircle(34, 24, 16);
        g.generateTexture("nuvem", 70, 40);
        g.destroy();
      }
      for (let i = 0; i < 5; i++) {
        const x = Math.random() * TELA_W;
        const y = 30 + Math.random() * 200;
        const n = scene.add.image(x, y, "nuvem").setDepth(1);
        n.dataVel = 20 + Math.random() * 25; // velocidade individual (parallax variado)
        nuvens.push(n);
      }
    }
  </script>
