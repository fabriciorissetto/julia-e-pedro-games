<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundinho — Família</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    #game, #game canvas { width: 100vw !important; height: 100vh !important; display: block; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

    .voltar {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.5); color: white; text-decoration: none;
      padding: 8px 16px; border-radius: 8px;
      font-family: sans-serif; font-size: 14px; z-index: 10;
    }
    .voltar:hover { background: rgba(0,0,0,0.8); }

    .seletor-mapa {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.5); padding: 4px; border-radius: 8px;
      font-family: sans-serif; font-size: 14px; z-index: 10;
    }
    .seletor-mapa a {
      color: white; text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: background 0.15s;
    }
    .seletor-mapa a:hover { background: rgba(255,255,255,0.15); }
    .seletor-mapa a.ativo { background: rgba(255,255,255,0.25); font-weight: bold; }

    .aviso {
      color: white; max-width: 600px; padding: 32px;
      background: #2d1b3d; border-radius: 16px; line-height: 1.6;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .aviso h1 { color: #ffb347; margin-bottom: 16px; }
    .aviso code { background: #1a1a2e; padding: 2px 8px; border-radius: 4px; color: #ffd6e8; }
    .aviso a { color: #ffb347; }
    .aviso ol { margin: 16px 0 16px 24px; line-height: 1.8; }
  </style>
</head>
<body>
  <a class="voltar" href="../">← Voltar</a>
  <nav class="seletor-mapa" id="seletor-mapa">
    <a href="?mapa=inicial" data-mapa="inicial">🏝️ Inicial</a>
    <a href="?mapa=mundojulia" data-mapa="mundojulia">👧 Julia</a>
    <a href="?mapa=mundopedro" data-mapa="mundopedro">👦 Pedro</a>
  </nav>
  <div id="game"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    const VELOCIDADE = 180;

    // Linha do spritesheet pra cada direção (player_walk.png e player_idle.png).
    // Cada arquivo é 4x4 frames de 96x96.
    // Layout schwarnhild: row 0=down (frente), row 1=left, row 2=up (costas),
    // row 3=right. Validado pelo teste "player vira pra direita ao andar pra direita".
    const LINHA_DIRECAO = { down: 0, left: 1, up: 2, right: 3 };

    // Cache-busting: força o browser a sempre buscar a versão mais nova do
    // mapa e tilesets. Sem isso, Cmd+S no Tiled nem sempre reflete no F5.
    const noCache = `?t=${Date.now()}`;

    // Qual mapa carregar — vem do ?mapa=<nome> da URL. Default: inicial.
    // Validação: só aceita [a-zA-Z0-9_-] pra evitar path traversal.
    const params = new URLSearchParams(location.search);
    const mapaNome = (params.get('mapa') || 'inicial').replace(/[^a-zA-Z0-9_-]/g, '');

    // Marca o link do mapa atual como ativo no seletor
    const linkAtivo = document.querySelector(`#seletor-mapa a[data-mapa="${mapaNome}"]`);
    if (linkAtivo) linkAtivo.classList.add('ativo');

    // Lê o .tmj antes de iniciar pra descobrir quais imagens de tileset
    // precisam ser pré-carregadas (Tiled embute o caminho da imagem).
    async function init() {
      let mapaJson;
      try {
        const r = await fetch(`./assets/maps/${mapaNome}.tmj${noCache}`);
        if (!r.ok) throw new Error('fail');
        mapaJson = await r.json();
      } catch {
        return mostrarInstrucoes();
      }

      class Mundinho extends Phaser.Scene {
        constructor() { super('Mundinho'); }

        preload() {
          this.load.tilemapTiledJSON('mapa', `./assets/maps/${mapaNome}.tmj${noCache}`);
          // Cada tileset embutido no .tmj tem um campo "image" relativo ao
          // próprio .tmj. Carrega cada um com a key "ts_<nome>".
          mapaJson.tilesets.forEach(ts => {
            if (ts.image) {
              this.load.image(`ts_${ts.name}`, './assets/maps/' + ts.image + noCache);
            }
          });
          // Player: 4x4 frames de 96x96 em cada arquivo
          this.load.spritesheet('player_idle', `./assets/characters/player_idle.png${noCache}`,
            { frameWidth: 96, frameHeight: 96 });
          this.load.spritesheet('player_walk', `./assets/characters/player_walk.png${noCache}`,
            { frameWidth: 96, frameHeight: 96 });
        }

        create() {
          const map = this.make.tilemap({ key: 'mapa' });

          // Conecta cada tileset declarado no .tmj com a textura carregada
          const tilesets = map.tilesets
            .map(ts => map.addTilesetImage(ts.name, `ts_${ts.name}`))
            .filter(Boolean);

          // Renderiza TODAS as tile layers do mapa na ordem em que aparecem
          // no .tmj. Convenções de nome:
          //   "colisao*"  -> bloqueia o player
          //   "acima*"    -> desenha POR CIMA do player (topo de árvore,
          //                  telhado, ponte alta — coisas que o player passa
          //                  "por trás" no jogo).
          this.layers = {};
          this.layersColisao = [];
          const layersAcima = [];
          map.layers.forEach(layerData => {
            const phaserLayer = map.createLayer(layerData.name, tilesets, 0, 0);
            if (!phaserLayer) return;
            this.layers[layerData.name] = phaserLayer;
            const nome = layerData.name.toLowerCase();
            if (nome.startsWith('colisao')) {
              phaserLayer.setCollisionByExclusion([-1]);
              this.layersColisao.push(phaserLayer);
            }
            if (nome.startsWith('acima')) {
              layersAcima.push(phaserLayer);
            }
          });
          // Depth: tudo começa em 0. Player vai pra 10, layers "acima" pra 20.
          // Assim o player fica acima de chão/decoração/colisão mas atrás
          // das partes "altas" como copa de árvore.
          this.layersAcima = layersAcima;

          this.criarAnimacoes();
          this.criarPlayer(map);

          this.cameras.main.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
          this.cameras.main.startFollow(this.player, true, 0.15, 0.15);
          this.cameras.main.setZoom(2);

          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys({ up: 'W', down: 'S', left: 'A', right: 'D' });
        }

        criarAnimacoes() {
          // 4 direções × 4 frames cada, em ambos os arquivos
          Object.entries(LINHA_DIRECAO).forEach(([dir, linha]) => {
            const inicio = linha * 4;
            this.anims.create({
              key: `idle_${dir}`,
              frames: this.anims.generateFrameNumbers('player_idle', { start: inicio, end: inicio + 3 }),
              frameRate: 4,
              repeat: -1
            });
            this.anims.create({
              key: `walk_${dir}`,
              frames: this.anims.generateFrameNumbers('player_walk', { start: inicio, end: inicio + 3 }),
              frameRate: 8,
              repeat: -1
            });
          });
        }

        criarPlayer(map) {
          // Spawn no centro do mapa, ou em um object "player" da layer "spawns"
          let x = map.widthInPixels / 2;
          let y = map.heightInPixels / 2;
          const spawns = map.getObjectLayer('spawns');
          if (spawns) {
            const obj = spawns.objects.find(o => o.name === 'player');
            if (obj) { x = obj.x; y = obj.y; }
          }

          this.player = this.physics.add.sprite(x, y, 'player_idle', 0);
          this.player.setCollideWorldBounds(true);
          this.player.setDepth(10);
          // Hitbox no pé do personagem (~24x16 px). Sprite é 96x96 mas
          // o personagem ocupa só uma parte. Ajusta esses números se a
          // colisão com árvores/casas ficar esquisita (player passando
          // por cima ou batendo no ar).
          // Hitbox calibrada por análise pixel-a-pixel do sprite schwarnhild
          // (frame 96x96). Personagem real ocupa x=31-63, y=10-63 — tem
          // ~32px de espaço vazio embaixo dentro do frame!
          // Body 22x12 cobrindo os pés (y 51-63 do frame, x 36-58).
          this.player.body.setSize(22, 12).setOffset(36, 51);
          this.player.facing = 'down';
          this.player.anims.play('idle_down');

          this.layersColisao.forEach(l => this.physics.add.collider(this.player, l));
          this.layersAcima.forEach(l => l.setDepth(20));
        }

        update() {
          if (!this.player) return;
          const body = this.player.body;
          body.setVelocity(0);

          const esq  = this.cursors.left.isDown  || this.wasd.left.isDown;
          const dir  = this.cursors.right.isDown || this.wasd.right.isDown;
          const cima = this.cursors.up.isDown    || this.wasd.up.isDown;
          const baix = this.cursors.down.isDown  || this.wasd.down.isDown;

          let facing = this.player.facing;
          let movendo = false;

          // Vertical primeiro, horizontal depois — assim na diagonal o
          // personagem fica virado pro lado (mais natural que pra cima/baixo).
          if (cima) { body.setVelocityY(-VELOCIDADE); facing = 'up';    movendo = true; }
          if (baix) { body.setVelocityY(VELOCIDADE);  facing = 'down';  movendo = true; }
          if (esq)  { body.setVelocityX(-VELOCIDADE); facing = 'left';  movendo = true; }
          if (dir)  { body.setVelocityX(VELOCIDADE);  facing = 'right'; movendo = true; }

          // Diagonal não pode ser mais rápida que reta
          body.velocity.normalize().scale(VELOCIDADE);

          this.player.facing = facing;
          const animDesejada = (movendo ? 'walk_' : 'idle_') + facing;
          if (this.player.anims.currentAnim?.key !== animDesejada) {
            this.player.anims.play(animDesejada, true);
          }
        }
      }

      window.game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game',
        backgroundColor: '#1a1a2e',
        pixelArt: true,
        scale: {
          // RESIZE: canvas acompanha o tamanho da janela. Sem barras pretas.
          mode: Phaser.Scale.RESIZE,
          width: '100%',
          height: '100%'
        },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: [Mundinho]
      });
    }

    function mostrarInstrucoes() {
      const div = document.createElement('div');
      div.className = 'aviso';
      div.innerHTML = `
        <h1>🌱 Bem-vindo ao Mundinho</h1>
        <p>Antes de jogar, falta o tileset e o primeiro mapa.</p>
        <ol>
          <li>Baixar o <a href="https://schwarnhild.itch.io/basic-tileset-and-asset-pack-32x32-pixels" target="_blank">Basic Tileset 32x32 da schwarnhild</a></li>
          <li>Extrair os PNGs em <code>familia/mundinho/assets/tilesets/</code></li>
          <li>Abrir o Tiled, criar o mapa, salvar como <code>familia/mundinho/assets/maps/mundinho.tmj</code></li>
          <li>Recarregar essa página</li>
        </ol>
        <p style="opacity:0.8;font-size:14px">Layers esperadas: <code>chao</code>, <code>decoracao</code>, <code>colisao</code> (opcional: object layer <code>spawns</code> com um objeto <code>player</code>).</p>
      `;
      document.getElementById('game').appendChild(div);
    }

    init();
  </script>
</body>
</html>
