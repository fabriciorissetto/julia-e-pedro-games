<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExterminaLatas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0b1220;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: white;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game { width: 100vw; height: 100vh; }
    .back {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }
    .back:hover { background: rgba(255,255,255,0.28); }

    /* overlay de seleção de nome */
    #nome-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }
    #nome-overlay.show { display: flex; }
    .nome-box {
      background: linear-gradient(135deg, #1a2540 0%, #0b1220 100%);
      padding: 28px 24px;
      border-radius: 16px;
      border: 2px solid #ff7e45;
      text-align: center;
      max-width: 380px;
      width: 86%;
      box-shadow: 0 20px 60px rgba(255, 126, 69, 0.3);
    }
    .nome-box h2 {
      color: #ffd166;
      margin-bottom: 6px;
      font-family: Impact, sans-serif;
      font-size: 32px;
      letter-spacing: 0.06em;
    }
    .nome-box p { color: #9bb; margin-bottom: 18px; font-size: 13px; }
    #campo-nome {
      width: 100%;
      padding: 12px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      border: 2px solid #4f9bff;
      background: #0b1220;
      color: white;
      text-align: center;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #campo-nome:focus { outline: none; border-color: #ff7e45; }
    #btn-comecar {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ff7e45, #ff4f6f);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #btn-comecar:hover { transform: scale(1.03); }
    #btn-comecar:active { transform: scale(0.98); }

    /* ===== Konami Code easter egg ===== */
    #cubo-konami {
      position: fixed;
      top: 50%; left: 50%;
      width: 100px; height: 100px;
      background: #000;
      color: #ffd166;
      font-size: 64px;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      border: 3px solid #ffd166;
      border-radius: 14px;
      z-index: 50;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(255, 209, 102, 0.7);
      display: none;
      transform: translate(-50%, -50%);
      animation: pulseKonami 0.6s ease-in-out infinite alternate;
    }
    #cubo-konami.show { display: flex; }
    @keyframes pulseKonami {
      from { box-shadow: 0 0 30px rgba(255, 209, 102, 0.5); }
      to   { box-shadow: 0 0 60px rgba(255, 209, 102, 1); }
    }

    #modal-konami {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 60;
      align-items: center;
      justify-content: center;
      display: none;
    }
    #modal-konami.show { display: flex; }
    .modal-konami-box {
      background: #1a1a2e;
      border: 2px solid #ffd166;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 420px;
      color: white;
    }
    .modal-konami-box .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .modal-konami-box .modal-header h2 {
      color: #ffd166;
      font-family: Impact, sans-serif;
      font-size: 24px;
      letter-spacing: 0.06em;
    }
    #fechar-konami {
      background: transparent;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
    }
    #busca-konami {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #555;
      background: #0b1220;
      color: white;
      border-radius: 6px;
      margin-bottom: 14px;
    }
    #busca-konami:focus { outline: none; border-color: #ffd166; }
    #resultados-konami { min-height: 80px; }
    #resultados-konami .vazio {
      color: #666;
      text-align: center;
      font-style: italic;
      padding: 22px 0;
      font-size: 14px;
    }
    .resultado-item {
      background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ffd166;
      transition: transform 0.1s;
    }
    .resultado-item:hover { transform: scale(1.02); }
    .resultado-item .nome { font-size: 28px; font-weight: bold; color: #ffd166; }
    .resultado-item .desc { font-size: 13px; color: #ccc; margin-top: 6px; }

    #cubo-branco {
      position: fixed;
      bottom: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 6px;
      z-index: 30;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.6);
      transition: transform 0.15s;
      display: none;
    }
    #cubo-branco.show { display: block; animation: brilhoBranco 1.4s ease-in-out infinite alternate; }
    #cubo-branco:hover { transform: scale(1.18); }
    @keyframes brilhoBranco {
      from { box-shadow: 0 0 8px rgba(255,255,255,0.4); }
      to   { box-shadow: 0 0 22px rgba(255,255,255,1); }
    }

    #toast {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #ffd166;
      padding: 18px 26px;
      border-radius: 10px;
      border: 1px solid #ffd166;
      z-index: 70;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 80%;
      display: none;
    }
    #toast.show { display: block; animation: toastIn 3s forwards; }
    @keyframes toastIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
      10%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      85%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
  </style>
</head>
<body>
  <a class="back" href="../">← Voltar</a>
  <div id="game"></div>

  <div id="nome-overlay">
    <div class="nome-box">
      <h2>QUAL O SEU NOME?</h2>
      <p>(tente nomes diferentes pra descobrir coisas)</p>
      <input id="campo-nome" type="text" maxlength="20" autocomplete="off" />
      <button id="btn-comecar">COMEÇAR</button>
    </div>
  </div>

  <div id="cubo-konami">?</div>

  <div id="modal-konami">
    <div class="modal-konami-box">
      <div class="modal-header">
        <h2>ABA KONAMI</h2>
        <button id="fechar-konami" type="button">×</button>
      </div>
      <input id="busca-konami" type="text" placeholder="🔍 Pesquisar..." autocomplete="off" />
      <div id="resultados-konami">
        <p class="vazio">Nada por aqui ainda...</p>
      </div>
    </div>
  </div>

  <div id="cubo-branco" title="???"></div>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
  // ============================================================
  // ExterminaLatas — Marcelo
  // ============================================================

  const W = 480
  const H = 720

  // ---------- perfis (easter eggs por nome) ----------
  function decidirPerfil(nomeRaw) {
    const nome = (nomeRaw || '').trim().toLowerCase()
    if (nome === 'fabricio' || nome === 'marcelo') {
      return {
        nome: nome.toUpperCase(),
        tipo: 'super',
        label: '⚡ MODO METRALHADORA',
        cor: '#ffd166',
        cooldown: 50,
        piercing: 3,
        vidas: 3,
        permiteR: true,
        sprite: 'garrafa',
        tiroSprite: 'tiro',
        bombaContato: false
      }
    }
    if (nome === 'pedro') {
      return {
        nome: 'PEDRO',
        tipo: 'tanque',
        label: '🛡 MODO TANQUE',
        cor: '#4f9bff',
        cooldown: 2000,
        piercing: 1,
        vidas: 5,
        permiteR: false,
        sprite: 'garrafa',
        tiroSprite: 'tiro',
        bombaContato: false
      }
    }
    if (nome === 'julia') {
      return {
        nome: 'JULIA',
        tipo: 'princesa',
        label: '👑 MODO PRINCESA',
        cor: '#ff6fb5',
        cooldown: 500,
        piercing: 1,
        vidas: 3,
        permiteR: false,
        sprite: 'princesa',
        tiroSprite: 'tiroCoracao',
        bombaContato: false
      }
    }
    if (nome === 'carol') {
      return {
        nome: 'CAROL',
        tipo: 'chinelo',
        label: '🩴 MODO CHINELO',
        cor: '#ff4f6f',
        cooldown: 500,
        piercing: 1,
        vidas: 3,
        permiteR: false,
        sprite: 'chinelo',
        tiroSprite: 'tiro',
        bombaContato: true,
        inimigoSprite: 'menino',
        frasesInimigo: ['ficou acordado até tarde', 'aprontou', 'arrumou briga']
      }
    }
    return {
      nome: nome ? nome.toUpperCase() : 'JOGADOR',
      tipo: 'normal',
      label: nome ? nome.toUpperCase() : 'JOGADOR',
      cor: '#ffffff',
      cooldown: 500,
      piercing: 1,
      vidas: 3,
      permiteR: false,
      sprite: 'garrafa',
      tiroSprite: 'tiro',
      bombaContato: false
    }
  }

  // ---------- helpers do overlay ----------
  function mostrarOverlay() {
    const ov = document.getElementById('nome-overlay')
    ov.classList.add('show')
    const inp = document.getElementById('campo-nome')
    inp.focus()
    inp.select()
  }
  function esconderOverlay() {
    document.getElementById('nome-overlay').classList.remove('show')
  }

  // ============================================================
  // KONAMI CODE EASTER EGG
  // ============================================================
  // Sequência clássica: ↑↑↓↓←→←→ B A
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA']
  let konamiBuffer = []

  const FLAG_UNLOCKED = 'exterminalatas_konami_unlocked'
  const FLAG_IMORTAL  = 'exterminalatas_imortal'

  const konamiJaUsado = () => localStorage.getItem(FLAG_UNLOCKED) === 'true'
  const imortalAtivo  = () => localStorage.getItem(FLAG_IMORTAL) === 'true'
  // pedro/marcelo podem usar o konami code infinitas vezes
  const modoKonamiLivre = () => {
    const nome = (window.__perfilAtual && window.__perfilAtual.nome || '').toLowerCase()
    return nome === 'pedro' || nome === 'marcelo'
  }

  function mostrarToast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.remove('show')
    void el.offsetWidth // força reflow pro animation reiniciar
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 3000)
  }

  function atualizarCuboBranco() {
    const cubo = document.getElementById('cubo-branco')
    cubo.classList.toggle('show', konamiJaUsado() && !imortalAtivo())
  }

  function ativarKonami() {
    if (konamiJaUsado() && !modoKonamiLivre()) return // pedro/marcelo bypassam o limite
    const cubo = document.getElementById('cubo-konami')
    cubo.classList.add('show')
    const sumir = setTimeout(() => {
      cubo.classList.remove('show')
      cubo.onclick = null
    }, 3000)
    cubo.onclick = () => {
      clearTimeout(sumir)
      cubo.classList.remove('show')
      cubo.onclick = null
      abrirModalKonami()
    }
  }

  function abrirModalKonami() {
    const modal = document.getElementById('modal-konami')
    const busca = document.getElementById('busca-konami')
    const resultados = document.getElementById('resultados-konami')
    modal.classList.add('show')
    busca.value = ''
    resultados.innerHTML = '<p class="vazio">Nada por aqui ainda...</p>'
    busca.focus()

    busca.oninput = () => {
      const q = busca.value.trim().toLowerCase().replace(/\s+/g, '')
      if (q === '') {
        resultados.innerHTML = '<p class="vazio">Nada por aqui ainda...</p>'
        return
      }
      if (q === 'omarceloeomelhor') {
        resultados.innerHTML = ''
        const item = document.createElement('div')
        item.className = 'resultado-item'
        item.innerHTML = '<div class="nome">???</div><div class="desc">clique em mim e conhecerá algo nunca já visto</div>'
        item.onclick = () => {
          localStorage.setItem(FLAG_UNLOCKED, 'true')
          modal.classList.remove('show')
          atualizarCuboBranco()
          mostrarToast('🎁 ALGO APARECEU NO CANTO DA TELA...')
        }
        resultados.appendChild(item)
      } else {
        resultados.innerHTML = '<p class="vazio">Nenhum resultado.</p>'
      }
    }
  }

  document.getElementById('fechar-konami').onclick = () => {
    document.getElementById('modal-konami').classList.remove('show')
  }

  document.getElementById('cubo-branco').onclick = () => {
    if (imortalAtivo()) return
    localStorage.setItem(FLAG_IMORTAL, 'true')
    atualizarCuboBranco() // some agora
    mostrarToast('💀 IMORTAL! NADA PODE TE PARAR.')
    // ativa imediatamente se tem jogo rolando
    if (window.__gameScene && !window.__gameScene.gameOver) {
      window.__gameScene.imortal = true
      if (window.__gameScene.player) {
        window.__gameScene.player.setTint(0xffd166)
      }
      if (window.__gameScene.txtImortal) window.__gameScene.txtImortal.setVisible(true)
    }
  }

  // listener global do konami
  window.addEventListener('keydown', (e) => {
    if (konamiJaUsado() && !modoKonamiLivre()) return
    konamiBuffer.push(e.code)
    if (konamiBuffer.length > KONAMI.length) konamiBuffer = konamiBuffer.slice(-KONAMI.length)
    if (konamiBuffer.length === KONAMI.length && konamiBuffer.every((k, i) => k === KONAMI[i])) {
      konamiBuffer = []
      ativarKonami()
    }
  })

  // se o usuário já desbloqueou em sessão anterior, mostra o cubo branco
  atualizarCuboBranco()

  // ---------- som via WebAudio (sem arquivos) ----------
  let audioCtx = null
  function audio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    return audioCtx
  }
  function bip(freq, dur, type = 'square', vol = 0.1) {
    const ctx = audio()
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.type = type
    osc.frequency.value = freq
    gain.gain.value = vol
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur)
    osc.connect(gain).connect(ctx.destination)
    osc.start()
    osc.stop(ctx.currentTime + dur)
  }
  function ruido(dur, vol = 0.15) {
    const ctx = audio()
    const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate)
    const data = buffer.getChannelData(0)
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length)
    const src = ctx.createBufferSource()
    src.buffer = buffer
    const gain = ctx.createGain()
    gain.gain.value = vol
    src.connect(gain).connect(ctx.destination)
    src.start()
  }
  const somTiro = () => bip(880, 0.07, 'square', 0.06)
  const somExplode = () => { ruido(0.18, 0.12); bip(180, 0.18, 'sawtooth', 0.08) }
  const somDano = () => { bip(120, 0.3, 'sawtooth', 0.18); ruido(0.25, 0.1) }
  const somGameOver = () => {
    bip(440, 0.15, 'square', 0.1)
    setTimeout(() => bip(330, 0.15, 'square', 0.1), 150)
    setTimeout(() => bip(220, 0.4, 'square', 0.12), 300)
  }

  // ============================================================
  // Cena MENU
  // ============================================================
  class Menu extends Phaser.Scene {
    constructor() { super('Menu') }

    create() {
      window.__perfilAtual = null // limpa perfil ao voltar ao menu
      // fundo estrelado
      this.estrelas = []
      for (let i = 0; i < 80; i++) {
        const s = this.add.circle(
          Phaser.Math.Between(0, W),
          Phaser.Math.Between(0, H),
          Phaser.Math.Between(1, 2),
          0xffffff,
          Phaser.Math.FloatBetween(0.3, 1)
        )
        s.vy = Phaser.Math.FloatBetween(0.3, 1.2)
        this.estrelas.push(s)
      }

      this.add.text(W / 2, 140, 'EXTERMINA', {
        fontSize: '54px', fontFamily: 'Impact, sans-serif', color: '#ffd166'
      }).setOrigin(0.5)

      this.add.text(W / 2, 200, 'LATAS', {
        fontSize: '74px', fontFamily: 'Impact, sans-serif', color: '#ff7e45'
      }).setOrigin(0.5)

      // garrafa decorativa
      const garrafa = this.add.image(W / 2, 340, 'garrafa').setScale(2)
      this.tweens.add({ targets: garrafa, y: 360, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' })

      this.add.text(W / 2, 470, 'WASD pra andar (ou arraste no celular)', { fontSize: '14px', color: '#9bb' }).setOrigin(0.5)
      this.add.text(W / 2, 494, 'ESPAÇO pra atirar', { fontSize: '14px', color: '#9bb' }).setOrigin(0.5)

      const recorde = parseInt(localStorage.getItem('exterminalatas_hi') || '0')
      this.add.text(W / 2, 560, 'RECORDE: ' + recorde, { fontSize: '22px', color: '#ffd166', fontStyle: 'bold' }).setOrigin(0.5)

      // overlay de nome
      mostrarOverlay()
      const inp = document.getElementById('campo-nome')
      const btn = document.getElementById('btn-comecar')

      const comecar = () => {
        const perfil = decidirPerfil(inp.value)
        // remove listeners pra não duplicar
        btn.onclick = null
        inp.onkeydown = null
        esconderOverlay()
        this.scene.start('Game', { perfil })
      }
      btn.onclick = comecar
      inp.onkeydown = (e) => { if (e.key === 'Enter') comecar() }
    }

    update() {
      this.estrelas.forEach(s => {
        s.y += s.vy
        if (s.y > H) { s.y = 0; s.x = Phaser.Math.Between(0, W) }
      })
    }
  }

  // ============================================================
  // Cena GAME
  // ============================================================
  class Game extends Phaser.Scene {
    constructor() { super('Game') }

    init(data) {
      this.perfil = data.perfil || decidirPerfil('')
      window.__perfilAtual = this.perfil
    }

    create() {
      esconderOverlay()
      this.score = 0
      this.vidas = this.perfil.vidas
      this.proxTiro = 0
      this.proxSpawn = 0
      this.intervaloSpawn = 1400
      this.dificuldade = 0
      this.gameOver = false
      this.imortal = imortalAtivo()
      window.__gameScene = this

      // estrelas
      this.estrelas = []
      for (let i = 0; i < 100; i++) {
        const s = this.add.circle(
          Phaser.Math.Between(0, W),
          Phaser.Math.Between(0, H),
          Phaser.Math.Between(1, 2),
          0xffffff,
          Phaser.Math.FloatBetween(0.3, 1)
        )
        s.vy = Phaser.Math.FloatBetween(0.5, 2)
        this.estrelas.push(s)
      }

      // player
      this.player = this.physics.add.sprite(W / 2, H - 90, this.perfil.sprite)
      this.player.setCollideWorldBounds(true)
      this.player.body.setSize(28, 40, true)
      if (this.imortal) this.player.setTint(0xffd166)

      // grupos
      this.tiros = this.physics.add.group()
      this.latas = this.physics.add.group()

      // colisões
      this.physics.add.overlap(this.tiros, this.latas, this.tiroAcerta, null, this)
      this.physics.add.overlap(this.player, this.latas, this.levaDano, null, this)

      // input — enableCapture=false pra não bloquear digitação no input HTML do menu
      this.teclas = this.input.keyboard.addKeys('W,A,S,D,SPACE,R,M,P', false, false)
      this.pausado = false

      // controles touch (mobile)
      this.touch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0
      this.botaoTiroPress = false
      this.dragTarget = null
      this.dragPointerId = null
      this.botaoPointerIds = new Set()
      if (this.touch) this.criarControlesTouch()

      // botão de pause (canto inferior esquerdo, longe dos botões touch)
      const btPause = this.add.text(14, H - 14, '⏸', {
        fontSize: '22px',
        backgroundColor: 'rgba(0,0,0,0.45)',
        padding: { x: 8, y: 4 }
      }).setOrigin(0, 1).setDepth(40)
      btPause.setInteractive({ useHandCursor: true })
      btPause.on('pointerdown', () => this.togglePausa())

      this.criarMenuPausa()

      // HUD
      this.txtScore = this.add.text(14, 12, 'SCORE: 0', { fontSize: '20px', color: '#fff', fontStyle: 'bold' })
      this.txtVidas = this.add.text(W - 14, 12, '❤'.repeat(this.vidas), { fontSize: '22px' }).setOrigin(1, 0)

      const recorde = parseInt(localStorage.getItem('exterminalatas_hi') || '0')
      this.txtRec = this.add.text(W / 2, 12, 'HI: ' + recorde, { fontSize: '16px', color: '#ffd166' }).setOrigin(0.5, 0)

      // mostra perfil ativo
      this.add.text(W / 2, 38, this.perfil.label, {
        fontSize: '13px', color: this.perfil.cor, fontStyle: 'bold'
      }).setOrigin(0.5, 0)
      if (this.perfil.permiteR) {
        this.add.text(W / 2, 56, '(R = + difícil)', {
          fontSize: '11px', color: '#9bb'
        }).setOrigin(0.5, 0)
      }
      // label de imortal
      const yImortal = this.perfil.permiteR ? 72 : 56
      this.txtImortal = this.add.text(W / 2, yImortal, '💀 IMORTAL', {
        fontSize: '13px', color: '#ffd166', fontStyle: 'bold'
      }).setOrigin(0.5, 0).setVisible(this.imortal)

      // dificuldade aumenta com o tempo (mais devagar pra dar tempo de respirar)
      this.time.addEvent({
        delay: 6000,
        loop: true,
        callback: () => {
          this.dificuldade++
          this.intervaloSpawn = Math.max(400, this.intervaloSpawn - 70)
        }
      })
    }

    update(time, delta) {
      // estrelas
      this.estrelas.forEach(s => {
        s.y += s.vy
        if (s.y > H) { s.y = 0; s.x = Phaser.Math.Between(0, W) }
      })

      if (this.gameOver) {
        if (this.teclas.R.isDown) this.scene.restart({ perfil: this.perfil })
        if (this.teclas.M.isDown) this.scene.start('Menu')
        return
      }

      // pause com P
      if (Phaser.Input.Keyboard.JustDown(this.teclas.P)) this.togglePausa()
      if (this.pausado) return

      // R durante o jogo: só no modo super, aumenta dificuldade
      if (this.perfil.permiteR && Phaser.Input.Keyboard.JustDown(this.teclas.R)) {
        this.aumentarDificuldade()
      }

      // movimento: drag no mobile tem prioridade, senão WASD
      if (this.dragTarget) {
        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.dragTarget.x, this.dragTarget.y)
        if (dist > 4) {
          this.physics.moveTo(this.player, this.dragTarget.x, this.dragTarget.y, 360)
        } else {
          this.player.setVelocity(0)
        }
      } else {
        const v = 280
        this.player.setVelocity(0)
        if (this.teclas.A.isDown) this.player.setVelocityX(-v)
        else if (this.teclas.D.isDown) this.player.setVelocityX(v)
        if (this.teclas.W.isDown) this.player.setVelocityY(-v)
        else if (this.teclas.S.isDown) this.player.setVelocityY(v)
      }

      // tiro: espaço OU botão mobile
      if ((this.teclas.SPACE.isDown || this.botaoTiroPress) && time > this.proxTiro) {
        this.atirar()
        this.proxTiro = time + this.perfil.cooldown
      }

      // spawn lata
      if (time > this.proxSpawn) {
        this.spawnLata()
        this.proxSpawn = time + this.intervaloSpawn
      }

      // limpar tiros que saíram
      this.tiros.children.each(t => { if (t.y < -20) t.destroy() })
      // latas: tag flutuante segue + remove se passou
      this.latas.children.each(l => {
        if (l.tag) l.tag.setPosition(l.x, l.y - 30)
        if (l.y > H + 30) {
          this.destruirLata(l)
          this.passouLata()
        }
      })
    }

    passouLata() {
      if (this.gameOver) return
      if (this.imortal) return
      this.vidas--
      this.txtVidas.setText('❤'.repeat(Math.max(0, this.vidas)))
      somDano()
      this.cameras.main.shake(150, 0.008)
      // flash vermelho na borda inferior pra avisar que passou
      const aviso = this.add.rectangle(W / 2, H - 4, W, 8, 0xff4f6f).setOrigin(0.5, 0.5)
      this.tweens.add({ targets: aviso, alpha: 0, duration: 400, onComplete: () => aviso.destroy() })
      if (this.vidas <= 0) this.terminar()
    }

    criarMenuPausa() {
      this.menuPausaContainer = this.add.container(0, 0).setDepth(100).setVisible(false)

      const bg = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.8)
      const titulo = this.add.text(W / 2, H / 2 - 150, 'PAUSADO', {
        fontSize: '54px', color: '#ffd166', fontFamily: 'Impact, sans-serif'
      }).setOrigin(0.5)

      const btnContinuar = this.fazerBotaoMenu(W / 2, H / 2 - 40, '▶ CONTINUAR', '#4f9bff', () => this.togglePausa())
      const btnReiniciar = this.fazerBotaoMenu(W / 2, H / 2 + 20, '↻ REINICIAR', '#ff7e45', () => {
        this.pausado = false
        this.physics.resume()
        this.scene.restart({ perfil: this.perfil })
      })
      const btnSair = this.fazerBotaoMenu(W / 2, H / 2 + 80, '⌂ TROCAR DE NOME', '#ff4f6f', () => {
        this.pausado = false
        this.physics.resume()
        this.scene.start('Menu')
      })

      const dica = this.add.text(W / 2, H / 2 + 160, 'P pra pausar/continuar', {
        fontSize: '13px', color: '#9bb'
      }).setOrigin(0.5)

      this.menuPausaContainer.add([bg, titulo, ...btnContinuar, ...btnReiniciar, ...btnSair, dica])
    }

    fazerBotaoMenu(x, y, texto, corHex, onClick) {
      const cor = Phaser.Display.Color.HexStringToColor(corHex).color
      const bg = this.add.rectangle(x, y, 240, 44, cor, 0.92).setStrokeStyle(2, 0xffffff, 0.7)
      const txt = this.add.text(x, y, texto, {
        fontSize: '18px', color: '#fff', fontStyle: 'bold'
      }).setOrigin(0.5)
      bg.setInteractive({ useHandCursor: true })
      bg.on('pointerdown', onClick)
      bg.on('pointerover', () => { bg.setScale(1.05); txt.setScale(1.05) })
      bg.on('pointerout',  () => { bg.setScale(1);    txt.setScale(1) })
      return [bg, txt]
    }

    togglePausa() {
      if (this.gameOver) return
      this.pausado = !this.pausado
      if (this.pausado) {
        this.physics.pause()
        this.menuPausaContainer.setVisible(true)
      } else {
        this.physics.resume()
        this.menuPausaContainer.setVisible(false)
      }
    }

    criarControlesTouch() {
      this.input.addPointer(2) // habilita multi-touch (até 3 dedos)

      // botão de tiro (canto inferior direito) — pequeno e translúcido
      const tx = W - 50, ty = H - 60
      const btnTiro = this.add.circle(tx, ty, 30, 0xff4f6f, 0.55).setInteractive()
      btnTiro.setStrokeStyle(2, 0xffffff, 0.7)
      const iconTiro = this.add.text(tx, ty, '🔫', { fontSize: '24px' }).setOrigin(0.5)
      btnTiro.setDepth(50); iconTiro.setDepth(50)

      const liberaTiro = (p) => {
        if (this.botaoPointerIds.has(p.id)) {
          this.botaoPointerIds.delete(p.id)
          if (this.botaoPointerIds.size === 0) this.botaoTiroPress = false
        }
      }
      btnTiro.on('pointerdown', (p) => {
        this.botaoPointerIds.add(p.id)
        this.botaoTiroPress = true
        btnTiro.setFillStyle(0xff4f6f, 0.85)
      })
      btnTiro.on('pointerup', (p) => { liberaTiro(p); btnTiro.setFillStyle(0xff4f6f, 0.55) })
      btnTiro.on('pointerupoutside', (p) => { liberaTiro(p); btnTiro.setFillStyle(0xff4f6f, 0.55) })
      btnTiro.on('pointerout', (p) => { btnTiro.setFillStyle(0xff4f6f, 0.55) })

      // botão de habilidade (só modo super) — ao lado do botão de tiro
      let btnSuper = null
      if (this.perfil.permiteR) {
        const sx = W - 110, sy = H - 60
        btnSuper = this.add.circle(sx, sy, 26, 0xffd166, 0.55).setInteractive()
        btnSuper.setStrokeStyle(2, 0xffffff, 0.7)
        const iconSuper = this.add.text(sx, sy, '⚡', { fontSize: '22px' }).setOrigin(0.5)
        btnSuper.setDepth(50); iconSuper.setDepth(50)
        btnSuper.on('pointerdown', (p) => {
          this.botaoPointerIds.add(p.id)
          if (!this.gameOver) this.aumentarDificuldade()
          btnSuper.setFillStyle(0xffd166, 0.9)
        })
        btnSuper.on('pointerup', (p) => { this.botaoPointerIds.delete(p.id); btnSuper.setFillStyle(0xffd166, 0.55) })
        btnSuper.on('pointerupoutside', (p) => { this.botaoPointerIds.delete(p.id); btnSuper.setFillStyle(0xffd166, 0.55) })
      }

      // drag global pra mover (só ativa se NÃO tocou em botão)
      this.input.on('pointerdown', (pointer, currentlyOver) => {
        if (currentlyOver && currentlyOver.length > 0) return // tocou em botão, ignora
        this.dragPointerId = pointer.id
        this.dragTarget = { x: pointer.x, y: pointer.y }
      })
      this.input.on('pointermove', (pointer) => {
        if (pointer.isDown && pointer.id === this.dragPointerId) {
          this.dragTarget = { x: pointer.x, y: pointer.y }
        }
      })
      this.input.on('pointerup', (pointer) => {
        if (pointer.id === this.dragPointerId) {
          this.dragPointerId = null
          this.dragTarget = null
        }
      })
    }

    atirar() {
      const tiro = this.tiros.create(this.player.x, this.player.y - 28, this.perfil.tiroSprite)
      tiro.body.setSize(8, 16)
      tiro.setVelocityY(-520)
      tiro.acertosRestantes = this.perfil.piercing
      // tiro com piercing fica laranja brilhante
      if (this.perfil.piercing > 1) tiro.setTint(0xffaa33)
      somTiro()
    }

    aumentarDificuldade() {
      this.dificuldade += 2
      this.intervaloSpawn = Math.max(150, this.intervaloSpawn - 200)
      // aviso na tela
      const aviso = this.add.text(W / 2, H / 2, 'MAIS DIFÍCIL!', {
        fontSize: '40px', color: '#ff4f6f', fontFamily: 'Impact, sans-serif'
      }).setOrigin(0.5)
      this.tweens.add({
        targets: aviso,
        scale: { from: 0.5, to: 1.4 },
        alpha: { from: 1, to: 0 },
        duration: 700,
        onComplete: () => aviso.destroy()
      })
      bip(660, 0.1, 'square', 0.12)
      setTimeout(() => bip(880, 0.15, 'square', 0.12), 100)
    }

    spawnLata() {
      const x = Phaser.Math.Between(30, W - 30)
      const sprite = this.perfil.inimigoSprite || 'lata'
      const lata = this.latas.create(x, -20, sprite)
      lata.body.setSize(28, 36)
      const vy = 90 + this.dificuldade * 18 + Phaser.Math.Between(0, 40)
      lata.setVelocityY(vy)
      // só lata gira (menino fica em pé)
      if (sprite === 'lata') lata.setAngularVelocity(Phaser.Math.Between(-80, 80))
      // tag com frase aleatória (modo carol)
      if (this.perfil.frasesInimigo) {
        const frase = Phaser.Utils.Array.GetRandom(this.perfil.frasesInimigo)
        lata.tag = this.add.text(x, -42, frase, {
          fontSize: '11px',
          color: '#fff',
          backgroundColor: '#222',
          padding: { x: 5, y: 2 },
          stroke: '#000',
          strokeThickness: 2
        }).setOrigin(0.5).setDepth(20)
      }
    }

    destruirLata(lata) {
      if (lata.tag) { lata.tag.destroy(); lata.tag = null }
      lata.destroy()
    }

    tiroAcerta(tiro, lata) {
      this.explodir(lata.x, lata.y)
      this.destruirLata(lata)
      tiro.acertosRestantes--
      if (tiro.acertosRestantes <= 0) tiro.destroy()
      this.score += 10
      this.txtScore.setText('SCORE: ' + this.score)
      somExplode()
    }

    explodir(x, y) {
      // particles (círculos voando)
      for (let i = 0; i < 12; i++) {
        const p = this.add.circle(x, y, Phaser.Math.Between(2, 5), Phaser.Utils.Array.GetRandom([0xffd166, 0xff7e45, 0xff4f6f, 0xffffff]))
        const ang = Math.random() * Math.PI * 2
        const sp = Phaser.Math.Between(80, 220)
        this.tweens.add({
          targets: p,
          x: x + Math.cos(ang) * sp,
          y: y + Math.sin(ang) * sp,
          alpha: 0,
          scale: 0,
          duration: Phaser.Math.Between(300, 600),
          onComplete: () => p.destroy()
        })
      }
    }

    levaDano(player, lata) {
      // imortal: destrói a lata, sem dano
      if (this.imortal) {
        this.explodir(lata.x, lata.y)
        this.destruirLata(lata)
        this.score += 10
        this.txtScore.setText('SCORE: ' + this.score)
        return
      }

      // chinelo da Carol: contato detona TODAS as latas com efeito de coração, sem perder vida
      if (this.perfil.bombaContato) {
        this.bombaCoracao()
        return
      }

      this.explodir(lata.x, lata.y)
      this.destruirLata(lata)
      this.vidas--
      this.txtVidas.setText('❤'.repeat(Math.max(0, this.vidas)))
      somDano()
      this.cameras.main.shake(220, 0.012)
      this.cameras.main.flash(120, 255, 80, 80)

      // i-frames: pisca o player
      this.player.setAlpha(0.3)
      this.time.delayedCall(800, () => this.player.setAlpha(1))

      if (this.vidas <= 0) this.terminar()
    }

    bombaCoracao() {
      // limpa todas as latas da tela, com efeito de coração voando
      const latasArr = this.latas.getChildren().slice()
      latasArr.forEach(lata => {
        const x = lata.x, y = lata.y
        // 6 corações voando por lata
        for (let i = 0; i < 6; i++) {
          const c = this.add.text(x, y, '❤', {
            fontSize: Phaser.Math.Between(18, 28) + 'px',
            color: Phaser.Utils.Array.GetRandom(['#ff4f6f', '#ff6fb5', '#ffd166', '#ff9fc4'])
          }).setOrigin(0.5)
          const ang = Math.random() * Math.PI * 2
          const sp = Phaser.Math.Between(80, 200)
          this.tweens.add({
            targets: c,
            x: x + Math.cos(ang) * sp,
            y: y + Math.sin(ang) * sp,
            alpha: 0,
            scale: { from: 1, to: 1.6 },
            angle: Phaser.Math.Between(-180, 180),
            duration: Phaser.Math.Between(500, 900),
            ease: 'Cubic.easeOut',
            onComplete: () => c.destroy()
          })
        }
        this.destruirLata(lata)
        this.score += 10
      })
      this.txtScore.setText('SCORE: ' + this.score)

      // flash rosa + shake leve
      this.cameras.main.flash(180, 255, 180, 220)
      this.cameras.main.shake(180, 0.008)

      // som mágico
      bip(660, 0.08, 'sine', 0.12)
      setTimeout(() => bip(880, 0.08, 'sine', 0.12), 70)
      setTimeout(() => bip(1320, 0.15, 'sine', 0.12), 140)

      // texto central
      const t = this.add.text(W / 2, H / 2, '💖 CHINELADA! 💖', {
        fontSize: '38px', color: '#ff4f6f', fontFamily: 'Impact, sans-serif'
      }).setOrigin(0.5)
      this.tweens.add({
        targets: t,
        scale: { from: 0.5, to: 1.4 },
        alpha: { from: 1, to: 0 },
        duration: 800,
        onComplete: () => t.destroy()
      })
    }

    terminar() {
      this.gameOver = true
      somGameOver()
      this.player.disableBody(true, true)
      this.physics.pause()

      // recorde
      const hi = parseInt(localStorage.getItem('exterminalatas_hi') || '0')
      const novoRecorde = this.score > hi
      if (novoRecorde) localStorage.setItem('exterminalatas_hi', this.score)

      const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.6)
      this.add.text(W / 2, H / 2 - 100, 'GAME OVER', {
        fontSize: '54px', color: '#ff4f6f', fontFamily: 'Impact, sans-serif'
      }).setOrigin(0.5)

      this.add.text(W / 2, H / 2 - 30, 'SCORE: ' + this.score, {
        fontSize: '32px', color: '#fff'
      }).setOrigin(0.5)

      if (novoRecorde) {
        const r = this.add.text(W / 2, H / 2 + 20, '🏆 NOVO RECORDE!', {
          fontSize: '24px', color: '#ffd166'
        }).setOrigin(0.5)
        this.tweens.add({ targets: r, scale: 1.15, duration: 400, yoyo: true, repeat: -1 })
      } else {
        this.add.text(W / 2, H / 2 + 20, 'RECORDE: ' + hi, {
          fontSize: '20px', color: '#ffd166'
        }).setOrigin(0.5)
      }

      // botões clicáveis (também funciona no mobile)
      this.fazerBotaoMenu(W / 2, H / 2 + 90, '▶ JOGAR DE NOVO', '#4f9bff', () => {
        this.scene.restart({ perfil: this.perfil })
      })
      this.fazerBotaoMenu(W / 2, H / 2 + 150, '⌂ IR PRO MENU', '#ff4f6f', () => {
        this.scene.start('Menu')
      })
      this.add.text(W / 2, H / 2 + 200, '(ou aperte R / M)', {
        fontSize: '12px', color: '#9bb'
      }).setOrigin(0.5)
    }
  }

  // ============================================================
  // BOOT — gera as texturas (garrafa, lata, tiro)
  // ============================================================
  class Boot extends Phaser.Scene {
    constructor() { super('Boot') }

    create() {
      this.fazerGarrafa()
      this.fazerLata()
      this.fazerTiro()
      this.fazerPrincesa()
      this.fazerChinelo()
      this.fazerTiroCoracao()
      this.fazerMenino()
      this.scene.start('Menu')
    }

    fazerGarrafa() {
      // garrafa PET virada de cabeça pra baixo (tampa pra baixo, fundo arredondado pra cima)
      const g = this.add.graphics()

      // corpo da garrafa (azul claro translúcido)
      g.fillStyle(0xb3e0ff, 1)
      g.fillRoundedRect(8, 16, 24, 38, 6)

      // brilho lateral (highlight)
      g.fillStyle(0xffffff, 0.5)
      g.fillRect(11, 20, 3, 28)

      // ondulações da garrafa (linhas escuras)
      g.lineStyle(1, 0x6fb5cc, 0.6)
      g.strokeRoundedRect(8, 16, 24, 38, 6)
      for (let y = 22; y < 50; y += 6) {
        g.lineBetween(9, y, 31, y)
      }

      // gargalo (pra baixo, fica como propulsor)
      g.fillStyle(0xb3e0ff, 1)
      g.fillRect(15, 54, 10, 6)

      // tampa (vermelha)
      g.fillStyle(0xff4f6f, 1)
      g.fillRoundedRect(13, 58, 14, 5, 2)

      // fundo da garrafa (em cima, pontas)
      g.fillStyle(0x99ccdd, 1)
      g.fillTriangle(8, 18, 14, 8, 16, 18)
      g.fillTriangle(16, 18, 20, 8, 24, 18)
      g.fillTriangle(24, 18, 30, 8, 32, 18)

      // chama do propulsor
      g.fillStyle(0xffaa33, 0.9)
      g.fillTriangle(15, 64, 25, 64, 20, 75)
      g.fillStyle(0xffee66, 0.9)
      g.fillTriangle(17, 64, 23, 64, 20, 70)

      g.generateTexture('garrafa', 40, 80)
      g.destroy()
    }

    fazerLata() {
      const g = this.add.graphics()

      // sombra
      g.fillStyle(0x000000, 0.3)
      g.fillEllipse(20, 38, 26, 5)

      // corpo da lata (cinza metálico)
      g.fillStyle(0xc0c0c0, 1)
      g.fillRoundedRect(6, 6, 28, 32, 4)

      // rótulo (faixa colorida no meio)
      g.fillStyle(0xff4f6f, 1)
      g.fillRect(6, 14, 28, 16)

      // texto fake "X" no rótulo (linhas brancas)
      g.lineStyle(2, 0xffffff, 1)
      g.lineBetween(12, 18, 18, 26)
      g.lineBetween(18, 18, 12, 26)
      g.lineBetween(22, 18, 28, 26)
      g.lineBetween(28, 18, 22, 26)

      // brilho lateral
      g.fillStyle(0xffffff, 0.4)
      g.fillRect(9, 7, 2, 30)

      // tampa em cima (anel)
      g.lineStyle(1, 0x808080, 1)
      g.strokeRoundedRect(6, 6, 28, 4, 2)
      g.fillStyle(0xa0a0a0, 1)
      g.fillCircle(20, 8, 2)

      g.generateTexture('lata', 40, 44)
      g.destroy()
    }

    fazerTiro() {
      const g = this.add.graphics()
      // gota de água azul
      g.fillStyle(0x4fdfff, 1)
      g.fillCircle(6, 10, 5)
      g.fillTriangle(1, 10, 11, 10, 6, 0)
      g.fillStyle(0xffffff, 0.7)
      g.fillCircle(5, 9, 1.5)
      g.generateTexture('tiro', 12, 16)
      g.destroy()
    }

    fazerTiroCoracao() {
      const g = this.add.graphics()
      // coração rosa
      g.fillStyle(0xff6fb5, 1)
      g.fillCircle(5, 6, 4)
      g.fillCircle(11, 6, 4)
      g.fillTriangle(1, 7, 15, 7, 8, 15)
      g.fillStyle(0xffffff, 0.6)
      g.fillCircle(4, 5, 1.2)
      g.generateTexture('tiroCoracao', 16, 16)
      g.destroy()
    }

    fazerPrincesa() {
      const g = this.add.graphics()

      // vestido (triângulo invertido rosa)
      g.fillStyle(0xff6fb5, 1)
      g.fillTriangle(4, 76, 36, 76, 20, 36)
      // detalhe do vestido (mais escuro embaixo)
      g.fillStyle(0xc94a8a, 1)
      g.fillTriangle(4, 76, 36, 76, 20, 64)
      // brilho do vestido
      g.fillStyle(0xffffff, 0.4)
      g.fillTriangle(14, 50, 18, 50, 16, 70)

      // tronco (parte de cima do vestido, mais clara)
      g.fillStyle(0xffaad4, 1)
      g.fillRoundedRect(12, 30, 16, 14, 3)

      // cabeça
      g.fillStyle(0xffd6b3, 1)
      g.fillCircle(20, 22, 9)
      // olhos
      g.fillStyle(0x000000, 1)
      g.fillCircle(17, 22, 1.5)
      g.fillCircle(23, 22, 1.5)
      // sorriso
      g.lineStyle(1.5, 0xc94a8a, 1)
      g.beginPath()
      g.arc(20, 25, 2.5, 0, Math.PI, false)
      g.strokePath()
      // bochecha
      g.fillStyle(0xff9fc4, 0.6)
      g.fillCircle(15, 24, 2)
      g.fillCircle(25, 24, 2)

      // cabelo loiro (atrás da cabeça)
      g.fillStyle(0xffe066, 1)
      g.fillCircle(11, 22, 5)
      g.fillCircle(29, 22, 5)
      g.fillRect(10, 22, 20, 12)

      // coroa
      g.fillStyle(0xffd700, 1)
      g.fillTriangle(13, 14, 16, 8, 19, 14)
      g.fillTriangle(17, 14, 20, 6, 23, 14)
      g.fillTriangle(21, 14, 24, 8, 27, 14)
      g.fillRect(13, 13, 14, 3)
      // joia da coroa
      g.fillStyle(0xff4f6f, 1)
      g.fillCircle(20, 11, 1.5)

      g.generateTexture('princesa', 40, 80)
      g.destroy()
    }

    fazerMenino() {
      const g = this.add.graphics()
      const PELE = 0xc89a6f      // bronzeado
      const CABELO = 0x111111    // preto
      const OLHO = 0x000000      // escuro

      // sombra
      g.fillStyle(0x000000, 0.3)
      g.fillEllipse(20, 41, 22, 4)

      // camiseta
      g.fillStyle(0xc94a4a, 1)
      g.fillRoundedRect(10, 22, 20, 18, 3)
      g.fillStyle(0x8a3535, 1)
      g.fillRect(10, 36, 20, 4) // barra mais escura embaixo

      // braços
      g.fillStyle(PELE, 1)
      g.fillCircle(9, 26, 3)
      g.fillCircle(31, 26, 3)

      // pescoço
      g.fillStyle(PELE, 1)
      g.fillRect(17, 20, 6, 4)

      // cabeça
      g.fillStyle(PELE, 1)
      g.fillCircle(20, 14, 8)

      // cabelo preto liso (topo + franja na frente)
      g.fillStyle(CABELO, 1)
      g.fillEllipse(20, 8, 18, 8)        // topo
      g.fillRect(11, 8, 18, 4)           // base do cabelo
      g.fillTriangle(11, 12, 18, 12, 14, 16)   // mecha esquerda da franja
      g.fillTriangle(22, 12, 29, 12, 26, 16)   // mecha direita da franja
      g.fillRect(15, 12, 10, 3)          // meio da franja

      // orelhas (brevíssimas)
      g.fillStyle(PELE, 1)
      g.fillCircle(12, 14, 1.5)
      g.fillCircle(28, 14, 1.5)

      // olhos escuros
      g.fillStyle(OLHO, 1)
      g.fillCircle(17, 16, 1.5)
      g.fillCircle(23, 16, 1.5)

      // boca
      g.lineStyle(1, 0x6b3e2a, 1)
      g.beginPath()
      g.moveTo(18, 19)
      g.lineTo(22, 19)
      g.strokePath()

      g.generateTexture('menino', 40, 44)
      g.destroy()
    }

    fazerChinelo() {
      const g = this.add.graphics()

      // sombra
      g.fillStyle(0x000000, 0.25)
      g.fillEllipse(20, 70, 26, 6)

      // sola (visto de cima, oval)
      g.fillStyle(0x4fdb9b, 1)
      g.fillEllipse(20, 38, 30, 56)
      // borda mais escura
      g.lineStyle(2, 0x2a8866, 1)
      g.strokeEllipse(20, 38, 30, 56)
      // brilho
      g.fillStyle(0xffffff, 0.3)
      g.fillEllipse(14, 28, 6, 18)

      // tira em V (preta)
      g.lineStyle(3, 0x222222, 1)
      g.beginPath()
      g.moveTo(20, 16)
      g.lineTo(13, 30)
      g.moveTo(20, 16)
      g.lineTo(27, 30)
      g.strokePath()
      // pino central (fixa as tiras)
      g.fillStyle(0x222222, 1)
      g.fillCircle(20, 16, 2)

      // florzinha decorativa
      g.fillStyle(0xff6fb5, 1)
      g.fillCircle(20, 20, 2)
      g.fillCircle(18, 18, 1.5)
      g.fillCircle(22, 18, 1.5)
      g.fillCircle(18, 22, 1.5)
      g.fillCircle(22, 22, 1.5)
      g.fillStyle(0xffd166, 1)
      g.fillCircle(20, 20, 0.8)

      g.generateTexture('chinelo', 40, 76)
      g.destroy()
    }
  }

  // ============================================================
  const config = {
    type: Phaser.AUTO,
    parent: 'game',
    width: W,
    height: H,
    backgroundColor: '#0b1220',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [Boot, Menu, Game]
  }

  new Phaser.Game(config)
  </script>
