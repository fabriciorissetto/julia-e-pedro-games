<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Galeria de Assets — Jpgames</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #232342;
    --panel2: #2c2c52;
    --text: #e6e6f0;
    --muted: #9090b0;
    --accent: #ffcc4d;
    --accent2: #66d9ef;
    --good: #7fdb8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    padding: 16px 24px; background: var(--panel);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--accent);
  }
  header h1 { margin: 0; font-size: 22px; }
  header .stats { color: var(--muted); font-size: 13px; }
  header input[type=search] {
    flex: 1; min-width: 200px; padding: 10px 14px;
    background: var(--panel2); border: 1px solid #444; border-radius: 8px;
    color: var(--text); font-size: 15px;
  }
  .tabs { display: flex; gap: 4px; padding: 12px 24px 0; background: var(--panel); }
  .tabs button {
    padding: 10px 18px; background: var(--panel2); border: none;
    color: var(--text); cursor: pointer; border-radius: 8px 8px 0 0;
    font-size: 14px; font-weight: 600;
  }
  .tabs button.active { background: var(--accent); color: #1a1a2e; }
  main { padding: 16px 24px 80px; }
  .category { margin-bottom: 32px; }
  .category h2 {
    margin: 0 0 4px; font-size: 18px; color: var(--accent2);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .category .path { color: var(--muted); font-size: 12px; font-family: monospace; margin-bottom: 12px; }
  .category .toggle { color: var(--muted); transition: transform .2s; }
  .category.collapsed .toggle { transform: rotate(-90deg); }
  .category.collapsed .grid, .category.collapsed .list { display: none; }
  .grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  }
  .grid .item {
    background: var(--panel); border: 1px solid #333; border-radius: 8px;
    padding: 8px; text-align: center; cursor: pointer; transition: transform .1s;
  }
  .grid .item:hover { transform: scale(1.05); border-color: var(--accent); }
  .grid .item img {
    width: 100%; height: 64px; object-fit: contain;
    image-rendering: pixelated; background: #fff2; border-radius: 4px;
  }
  .grid .item .name {
    font-size: 10px; color: var(--muted); margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list { display: flex; flex-direction: column; gap: 4px; }
  .list .item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; background: var(--panel); border-radius: 6px;
    border: 1px solid #333;
  }
  .list .item:hover { border-color: var(--accent); }
  .list .play {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--accent); color: #1a1a2e; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .list .play:hover { background: var(--good); }
  .list .name { flex: 1; font-family: monospace; font-size: 13px; }
  .list .copy {
    background: var(--panel2); border: 1px solid #444; color: var(--text);
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .list .copy:hover { background: var(--accent2); color: #1a1a2e; }
  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel); border-radius: 12px; padding: 24px;
    max-width: 600px; width: 100%; max-height: 90vh; overflow: auto;
  }
  .modal h3 { margin: 0 0 16px; word-break: break-all; }
  .modal .preview {
    background: #fff3; border-radius: 8px; padding: 20px;
    text-align: center; margin-bottom: 16px;
  }
  .modal .preview img {
    max-width: 100%; max-height: 300px; image-rendering: pixelated;
  }
  .modal .snippet {
    background: #0d0d1f; padding: 12px; border-radius: 6px;
    font-family: monospace; font-size: 13px; color: var(--good);
    overflow: auto; margin-bottom: 8px; cursor: pointer;
    border: 1px solid #333;
  }
  .modal .snippet:hover { border-color: var(--accent); }
  .modal .snippet .label { color: var(--muted); font-size: 11px; display: block; margin-bottom: 4px; }
  .modal .close {
    background: var(--accent); color: #1a1a2e; border: none;
    padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;
    margin-top: 12px;
  }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--good); color: #1a1a2e; padding: 12px 24px;
    border-radius: 8px; font-weight: 600; z-index: 200;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>🎨 Galeria de Assets</h1>
  <span class="stats" id="stats">carregando…</span>
  <input type="search" id="search" placeholder="🔍 buscar (ex: cat, click, fire)">
</header>

<div class="tabs">
  <button class="active" data-tab="sprites">🖼️ Sprites</button>
  <button data-tab="sounds">🔊 Sons</button>
</div>

<main id="main"><div class="empty">Carregando manifest…</div></main>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = './'; // assets are relative to this preview.html (which lives in /shared/assets/)
let manifest = null;
let currentTab = 'sprites';
let searchTerm = '';

async function load() {
  const res = await fetch('./manifest.json');
  manifest = await res.json();
  const sCount = Object.values(manifest.sprites).reduce((a, b) => a + b.length, 0);
  const aCount = Object.values(manifest.sounds).reduce((a, b) => a + b.length, 0);
  document.getElementById('stats').textContent = `${sCount} sprites · ${aCount} sons · CC0`;
  render();
}

function render() {
  const main = document.getElementById('main');
  const data = manifest[currentTab];
  const folders = Object.entries(data).filter(([folder, files]) => {
    if (!searchTerm) return true;
    return folder.toLowerCase().includes(searchTerm) ||
           files.some(f => f.toLowerCase().includes(searchTerm));
  });
  if (folders.length === 0) {
    main.innerHTML = '<div class="empty">Nada encontrado.</div>';
    return;
  }
  main.innerHTML = folders.map(([folder, files]) => {
    const filtered = searchTerm
      ? files.filter(f => f.toLowerCase().includes(searchTerm) || folder.toLowerCase().includes(searchTerm))
      : files;
    if (filtered.length === 0) return '';
    return renderFolder(folder, filtered);
  }).join('');
}

function renderFolder(folder, files) {
  const root = currentTab === 'sprites' ? 'sprites/kenney' : 'sounds/kenney';
  const fullPath = `${root}/${folder}`;
  const id = 'cat-' + Math.random().toString(36).slice(2, 8);
  if (currentTab === 'sprites') {
    const items = files.map(f => `
      <div class="item" onclick='openSprite(${JSON.stringify(folder)}, ${JSON.stringify(f)})'>
        <img src="${BASE}${fullPath}/${encodeURI(f)}" loading="lazy" alt="${f}">
        <div class="name" title="${f}">${f.replace(/\.png$/i, '')}</div>
      </div>
    `).join('');
    return `
      <div class="category" id="${id}">
        <h2 onclick="document.getElementById('${id}').classList.toggle('collapsed')">
          <span class="toggle">▼</span> ${folder} <span class="stats">(${files.length})</span>
        </h2>
        <div class="path">${fullPath}/</div>
        <div class="grid">${items}</div>
      </div>
    `;
  } else {
    const items = files.map(f => `
      <div class="item">
        <button class="play" onclick="playSound('${fullPath}/${encodeURI(f)}', this)">▶</button>
        <span class="name">${f}</span>
        <button class="copy" onclick='copyPath(${JSON.stringify(`sounds/kenney/${folder}/${f}`)}, "audio")'>copiar</button>
      </div>
    `).join('');
    return `
      <div class="category" id="${id}">
        <h2 onclick="document.getElementById('${id}').classList.toggle('collapsed')">
          <span class="toggle">▼</span> ${folder} <span class="stats">(${files.length})</span>
        </h2>
        <div class="path">${fullPath}/</div>
        <div class="list">${items}</div>
      </div>
    `;
  }
}

let currentAudio = null;
function playSound(path, btn) {
  if (currentAudio) { currentAudio.pause(); }
  currentAudio = new Audio(BASE + path);
  currentAudio.play();
  btn.textContent = '⏸';
  currentAudio.onended = () => { btn.textContent = '▶'; };
}

function openSprite(folder, file) {
  const fullPath = `sprites/kenney/${folder}/${file}`;
  const relFromGame = `../../shared/assets/${fullPath}`;
  const key = file.replace(/\.png$/i, '').replace(/[^a-z0-9]/gi, '_');
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3>${file}</h3>
    <div class="preview"><img src="${BASE}${fullPath}" alt="${file}"></div>
    <div class="snippet" onclick='copyPath(${JSON.stringify(relFromGame)}, "caminho")'>
      <span class="label">📋 caminho relativo (a partir de julia/&lt;jogo&gt;/ ou pedro/&lt;jogo&gt;/):</span>
      ${relFromGame}
    </div>
    <div class="snippet" onclick='copyPath(${JSON.stringify(`this.load.image('${key}', '${relFromGame}');`)}, "código Phaser")'>
      <span class="label">📋 Phaser preload:</span>
      this.load.image('${key}', '${relFromGame}');
    </div>
    <div class="snippet" onclick='copyPath(${JSON.stringify(`this.add.image(400, 300, '${key}');`)}, "código Phaser")'>
      <span class="label">📋 Phaser create:</span>
      this.add.image(400, 300, '${key}');
    </div>
    <button class="close" onclick="closeModal()">Fechar</button>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function copyPath(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(`✓ ${label} copiado!`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  };
});

document.getElementById('search').oninput = e => {
  searchTerm = e.target.value.toLowerCase().trim();
  render();
};

load().catch(err => {
  document.getElementById('main').innerHTML =
    `<div class="empty">Erro ao carregar manifest: ${err.message}<br>Rode <code>vercel dev</code> e abra via http, não file://</div>`;
});
</script>
</body>
</html>
