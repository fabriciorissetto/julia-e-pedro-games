<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cobrinha Come Come</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #222;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      background: #000;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    // Tamanho do grid em células
    const CELL = 24;
    const COLS = 20;
    const ROWS = 20;
    const W = CELL * COLS;
    const H = CELL * ROWS;

    let snake;        // array de {x,y}
    let dir;          // {x,y}
    let nextDir;
    let food;         // {x,y}
    let stepTimer = 0;
    const STEP_MS = 180;
    let scoreText;
    let score = 0;
    let graphics;

    function preload() {}

    function create() {
      graphics = this.add.graphics();

      // estado inicial
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      placeFood();

      scoreText = this.add.text(8, 8, 'Pontos: 0', {
        fontSize: '20px',
        color: '#ffffff',
        fontFamily: 'sans-serif'
      });

      // teclado
      this.input.keyboard.on('keydown-LEFT',  () => setDir(-1, 0));
      this.input.keyboard.on('keydown-RIGHT', () => setDir( 1, 0));
      this.input.keyboard.on('keydown-UP',    () => setDir( 0,-1));
      this.input.keyboard.on('keydown-DOWN',  () => setDir( 0, 1));

      // swipe / toque pra celular
      let startX = 0, startY = 0;
      this.input.on('pointerdown', (p) => {
        startX = p.x;
        startY = p.y;
      });
      this.input.on('pointerup', (p) => {
        const dx = p.x - startX;
        const dy = p.y - startY;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) {
          setDir(dx > 0 ? 1 : -1, 0);
        } else {
          setDir(0, dy > 0 ? 1 : -1);
        }
      });
    }

    function setDir(x, y) {
      // não pode virar pra trás
      if (snake.length > 1 && x === -dir.x && y === -dir.y) return;
      nextDir = { x, y };
    }

    function placeFood() {
      while (true) {
        const fx = Phaser.Math.Between(0, COLS - 1);
        const fy = Phaser.Math.Between(0, ROWS - 1);
        if (!snake.some(s => s.x === fx && s.y === fy)) {
          food = { x: fx, y: fy };
          return;
        }
      }
    }

    function reset() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      placeFood();
      scoreText.setText('Pontos: 0');
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // bateu na parede -> reseta suave
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        reset();
        return;
      }
      // bateu no próprio corpo -> reseta suave
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        reset();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreText.setText('Pontos: ' + score);
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      graphics.clear();

      // comida
      graphics.fillStyle(0xff5577, 1);
      graphics.fillRect(food.x * CELL, food.y * CELL, CELL, CELL);

      // cobrinha
      for (let i = 0; i < snake.length; i++) {
        const s = snake[i];
        graphics.fillStyle(i === 0 ? 0x88ff88 : 0x55cc55, 1);
        graphics.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
      }
    }

    function update(time, delta) {
      stepTimer += delta;
      if (stepTimer >= STEP_MS) {
        stepTimer = 0;
        step();
      }
      draw();
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      parent: 'game',
      width: W,
      height: H,
      backgroundColor: '#000000',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: { preload, create, update }
    });
  </script>
</body>
</html>
