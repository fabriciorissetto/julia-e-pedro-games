<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Passeio com o Cachorrinho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #ffd16f 0%, #ff6fb5 100%);
      font-family: 'Comic Sans MS', 'Trebuchet MS', cursive;
      touch-action: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .voltar {
      position: fixed;
      top: 12px;
      left: 12px;
      background: white;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      color: #b56fff;
      font-weight: bold;
      font-size: 18px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <a href="../" class="voltar">← Voltar</a>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    // sons simples sem precisar de arquivos
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function beep(freq, dur, type = 'sine', vol = 0.15) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    }
    function plim() { beep(880, 0.12); setTimeout(() => beep(1320, 0.15), 70); }
    function ai() { beep(200, 0.35, 'sawtooth', 0.18); }

    const LARGURA = 480;
    const ALTURA = 720;

    let boneca, cachorro, coleira, braco;
    let obstaculos, flores;
    let teclas;
    let pontos = 0;
    let pontosTexto, aiTexto;
    let invencivel = false;
    let dedoX = null;
    let ultimoObstaculo = 0;
    let ultimaFlor = 0;
    let tufos = [];
    let listras = [];

    // biomas que a estrada atravessa
    const BIOMAS = [
      { fundo: 0x88dd66, chao: 0xc9a77a, borda: 0xa88656, nome: 'TERRA',  emoji: '🌾', tufoA: 0x4a8a2a, tufoB: 0x55a338 },
      { fundo: 0x2d6e1a, chao: 0xa8e87a, borda: 0x88c85a, nome: 'GRAMA',  emoji: '🌳', tufoA: 0x1a4d10, tufoB: 0x255a18 },
      { fundo: 0x4dc6e8, chao: 0xf4d18a, borda: 0xd4a85a, nome: 'PRAIA',  emoji: '🏖️', tufoA: 0xfff3a8, tufoB: 0xffd86b },
    ];
    const META = 30;
    let biomaAtual = 0;
    let chegou = false;
    let estradaG;

    const config = {
      type: Phaser.AUTO,
      width: LARGURA,
      height: ALTURA,
      parent: 'game',
      backgroundColor: '#88dd66',
      physics: { default: 'arcade', arcade: { debug: false } },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: { preload, create, update }
    };

    new Phaser.Game(config);

    function preload() {
      this.load.image('princesa', 'princesa.png');
    }

    function criarCachorro(scene, x, y) {
      const c = scene.add.container(x, y);
      // rabinho atrás
      const rabo = scene.add.rectangle(28, -6, 14, 5, 0x9a6a3a).setOrigin(0, 0.5).setRotation(-0.5);
      // perninhas (atrás do corpo)
      const p1 = scene.add.rectangle(-12, 14, 7, 12, 0x6e4a22).setOrigin(0.5, 0);
      const p2 = scene.add.rectangle(0, 14, 7, 12, 0x6e4a22).setOrigin(0.5, 0);
      const p3 = scene.add.rectangle(12, 14, 7, 12, 0x6e4a22).setOrigin(0.5, 0);
      const p4 = scene.add.rectangle(22, 14, 7, 12, 0x6e4a22).setOrigin(0.5, 0);
      // corpo
      const corpo = scene.add.ellipse(2, 4, 56, 28, 0xa97042);
      // cabeça
      const cabeca = scene.add.circle(-22, -4, 16, 0xa97042);
      // orelha caidinha
      const orelha = scene.add.ellipse(-22, -16, 11, 16, 0x6e4a22);
      // focinho
      const focinho = scene.add.ellipse(-34, 0, 14, 10, 0xc99268);
      // nariz
      const nariz = scene.add.circle(-39, -2, 3, 0x222222);
      // olho
      const olho = scene.add.circle(-22, -7, 2.5, 0x222222);
      const brilho = scene.add.circle(-21, -8, 0.9, 0xffffff);
      // bochecha rosinha
      const bochecha = scene.add.circle(-30, 4, 3, 0xff9999, 0.6);
      // coleira no pescocinho
      const coleirinha = scene.add.rectangle(-14, -1, 14, 4, 0xff66cc);

      c.add([rabo, p1, p2, p3, p4, corpo, coleirinha, orelha, cabeca, focinho, bochecha, nariz, olho, brilho]);
      c.cabeca = cabeca;
      c.orelha = orelha;
      c.rabo = rabo;
      c.pernas = [p1, p2, p3, p4];
      return c;
    }

    function create() {
      // estrada do tamanho da tela toda
      estradaG = this.add.graphics();
      this.cameras.main.setBackgroundColor(BIOMAS[0].fundo);
      desenharEstrada();

      // tufinhos nas bordas (passam rolando)
      for (let i = 0; i < 24; i++) {
        const lado = Math.random() < 0.5 ? 0 : 1;
        const x = lado === 0 ? Phaser.Math.Between(2, 18) : Phaser.Math.Between(462, 478);
        const y = Phaser.Math.Between(0, ALTURA);
        const b = BIOMAS[0];
        const cor = Math.random() < 0.3 ? b.tufoA : b.tufoB;
        const tufo = this.add.circle(x, y, Phaser.Math.Between(3, 7), cor);
        tufos.push(tufo);
      }

      // listrinhas brancas no meio da estradinha
      for (let i = 0; i < 8; i++) {
        const listra = this.add.rectangle(240, i * 100, 5, 35, 0xffffff, 0.55);
        listras.push(listra);
      }

      // princesa (na frente, em cima)
      boneca = this.add.image(240, 480, 'princesa');
      boneca.setDisplaySize(110, 110);
      boneca.setDepth(3);
      this.physics.add.existing(boneca);
      boneca.body.setSize(60, 80).setOffset(
        boneca.width / 2 - 30,
        boneca.height / 2 - 40
      );

      // bracinho da princesa segurando a coleira (sai pra baixo)
      braco = this.add.container(boneca.x + 8, boneca.y + 40);
      const bracoCorpo = this.add.rectangle(0, 8, 7, 18, 0xffd9a8);
      const mao = this.add.circle(0, 18, 5, 0xffd9a8);
      braco.add([bracoCorpo, mao]);
      braco.setDepth(2);

      // cachorrinho atrás da princesa (embaixo)
      cachorro = criarCachorro(this, 240, 620);
      this.physics.add.existing(cachorro);
      cachorro.body.setSize(60, 38).setOffset(-30, -19);

      coleira = this.add.graphics();
      coleira.setDepth(1);

      obstaculos = this.physics.add.group();
      flores = this.physics.add.group();

      teclas = this.input.keyboard.createCursorKeys();

      this.input.on('pointerdown', (p) => { ensureAudio(); dedoX = p.worldX; });
      this.input.on('pointermove', (p) => { if (p.isDown) dedoX = p.worldX; });
      this.input.on('pointerup', () => { dedoX = null; });
      this.input.keyboard.on('keydown', () => ensureAudio());

      pontosTexto = this.add.text(LARGURA - 16, 16, '🌸 0 / ' + META, {
        fontSize: '32px', color: '#ffffff', fontStyle: 'bold',
        stroke: '#b56fff', strokeThickness: 5
      }).setOrigin(1, 0).setDepth(10);

      aiTexto = this.add.text(LARGURA / 2, ALTURA / 2, '', {
        fontSize: '96px', color: '#ff3377', fontStyle: 'bold',
        stroke: '#ffffff', strokeThickness: 8
      }).setOrigin(0.5).setDepth(10);

      // dica curta no comecinho
      const dica = this.add.text(LARGURA / 2, 80, 'Desvia das pedras\ne da lama!', {
        fontSize: '28px', color: '#ffffff', fontStyle: 'bold', align: 'center',
        stroke: '#b56fff', strokeThickness: 5
      }).setOrigin(0.5).setDepth(10);
      this.tweens.add({
        targets: dica, alpha: 0, delay: 2500, duration: 800,
        onComplete: () => dica.destroy()
      });
    }

    function update(tempo, delta) {
      const velocidade = 3.2;

      // grama rolando
      tufos.forEach(t => {
        t.y += velocidade;
        if (t.y > ALTURA + 10) {
          t.y = -10;
          const lado = Math.random() < 0.5 ? 0 : 1;
          t.x = lado === 0 ? Phaser.Math.Between(8, 70) : Phaser.Math.Between(410, 472);
        }
      });
      listras.forEach(l => {
        l.y += velocidade;
        if (l.y > ALTURA + 20) l.y = -30;
      });

      // movimento da princesa (limites maiores pra estrada larga)
      let alvoX = boneca.x;
      if (teclas.left.isDown) alvoX -= 5;
      if (teclas.right.isDown) alvoX += 5;
      if (dedoX !== null) {
        alvoX = Phaser.Math.Linear(boneca.x, dedoX, 0.18);
      }
      alvoX = Phaser.Math.Clamp(alvoX, 60, 420);
      boneca.x = alvoX;

      // cachorrinho segue logo atrás (embaixo) na mesma coluna
      cachorro.x = Phaser.Math.Linear(cachorro.x, boneca.x, 0.25);

      // balancinho fofo
      boneca.y = 480 + Math.sin(tempo / 110) * 4;
      cachorro.y = 620 + Math.sin(tempo / 110 + 1) * 4;

      // bracinho acompanha a princesa
      braco.x = boneca.x + 8;
      braco.y = boneca.y + 40;

      // pernas do cachorrinho balançando (animação simples)
      const swing = Math.sin(tempo / 80) * 3;
      cachorro.pernas[0].y = 14 + swing;
      cachorro.pernas[1].y = 14 - swing;
      cachorro.pernas[2].y = 14 + swing;
      cachorro.pernas[3].y = 14 - swing;
      cachorro.rabo.rotation = -0.5 + Math.sin(tempo / 100) * 0.3;

      // coleira (linha rosa saindo da mão da princesa pra baixo até o cachorrinho)
      coleira.clear();
      coleira.lineStyle(4, 0xff66cc, 1);
      const x1 = braco.x;
      const y1 = braco.y + 22;
      const x2 = cachorro.x;
      const y2 = cachorro.y - 16;
      const meioX = (x1 + x2) / 2 + 8;
      const meioY = (y1 + y2) / 2;
      coleira.beginPath();
      coleira.moveTo(x1, y1);
      const passos = 10;
      for (let i = 1; i <= passos; i++) {
        const t = i / passos;
        const u = 1 - t;
        const cx = u * u * x1 + 2 * u * t * meioX + t * t * x2;
        const cy = u * u * y1 + 2 * u * t * meioY + t * t * y2;
        coleira.lineTo(cx, cy);
      }
      coleira.strokePath();

      // nascer obstáculos
      if (!chegou && tempo - ultimoObstaculo > 850) {
        ultimoObstaculo = tempo;
        const x = Phaser.Math.Between(60, 420);
        const ehPedra = Math.random() < 0.55;
        if (ehPedra) {
          const pedra = this.add.text(x, -40, '🪨', { fontSize: '56px' }).setOrigin(0.5);
          this.physics.add.existing(pedra);
          pedra.body.setSize(40, 38);
          pedra.tipo = 'pedra';
          obstaculos.add(pedra);
        } else {
          // poça de lama (elipse marrom)
          const lama = this.add.ellipse(x, -40, 80, 36, 0x6b3e1a);
          const reflexo = this.add.ellipse(x - 14, -46, 26, 10, 0x8a5a2a);
          this.physics.add.existing(lama);
          lama.body.setSize(70, 28);
          lama.tipo = 'lama';
          lama.reflexo = reflexo;
          obstaculos.add(lama);
        }
      }

      // nascer florzinhas
      if (!chegou && tempo - ultimaFlor > 1400) {
        ultimaFlor = tempo;
        const x = Phaser.Math.Between(60, 420);
        const emojiFlor = Math.random() < 0.5 ? '🌸' : '⭐';
        const flor = this.add.text(x, -40, emojiFlor, { fontSize: '42px' }).setOrigin(0.5);
        this.physics.add.existing(flor);
        flor.body.setSize(34, 34);
        flores.add(flor);
        // brilho que gira
        this.tweens.add({
          targets: flor, angle: 360, duration: 2000, repeat: -1
        });
      }

      // mover e limpar
      obstaculos.children.iterate((o) => {
        if (!o) return;
        o.y += velocidade;
        if (o.reflexo) o.reflexo.y = o.y - 6;
        if (o.y > ALTURA + 50) {
          if (o.reflexo) o.reflexo.destroy();
          o.destroy();
        }
      });
      flores.children.iterate((f) => {
        if (!f) return;
        f.y += velocidade;
        if (f.y > ALTURA + 50) f.destroy();
      });

      // colisões
      if (!invencivel) {
        obstaculos.children.iterate((o) => {
          if (!o) return;
          if (encostou(boneca, o, 38) || encostou(cachorro, o, 38)) {
            tomarAi.call(this);
            if (o.reflexo) o.reflexo.destroy();
            o.destroy();
          }
        });
      }
      flores.children.iterate((f) => {
        if (!f) return;
        if (encostou(boneca, f, 34) || encostou(cachorro, f, 34)) {
          pontos += 1;
          pontosTexto.setText('🌸 ' + pontos + ' / ' + META);
          plim();
          // brilhinho rapidinho
          const brilho = this.add.text(f.x, f.y, '+1', {
            fontSize: '32px', color: '#fff', fontStyle: 'bold',
            stroke: '#ff66cc', strokeThickness: 4
          }).setOrigin(0.5);
          this.tweens.add({
            targets: brilho, y: brilho.y - 40, alpha: 0,
            duration: 600, onComplete: () => brilho.destroy()
          });
          f.destroy();
          // entrou em bioma novo?
          const novoBioma = Math.min(BIOMAS.length - 1, Math.floor(pontos / 10));
          if (novoBioma > biomaAtual) trocarBioma(this, novoBioma);
          // chegou no final?
          if (pontos >= META && !chegou) chegada(this);
        }
      });
    }

    function encostou(a, b, raio) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.abs(dx) < raio && Math.abs(dy) < raio;
    }

    function desenharEstrada() {
      const b = BIOMAS[biomaAtual];
      estradaG.clear();
      estradaG.fillStyle(b.chao);
      estradaG.fillRect(0, 0, LARGURA, ALTURA);
      estradaG.fillStyle(b.borda);
      estradaG.fillRect(0, 0, 6, ALTURA);
      estradaG.fillRect(LARGURA - 6, 0, 6, ALTURA);
    }

    function trocarBioma(scene, novo) {
      biomaAtual = novo;
      const b = BIOMAS[novo];
      scene.cameras.main.setBackgroundColor(b.fundo);
      desenharEstrada();
      // tufos pegam cor do novo bioma
      tufos.forEach(t => {
        t.fillColor = Math.random() < 0.3 ? b.tufoA : b.tufoB;
      });
      // banner gigante do bioma
      const banner = scene.add.text(LARGURA / 2, ALTURA / 2,
        b.emoji + '  ' + b.nome + '  ' + b.emoji, {
          fontSize: '56px', color: '#ffffff', fontStyle: 'bold',
          stroke: '#b56fff', strokeThickness: 8, align: 'center'
        }).setOrigin(0.5).setDepth(20).setScale(0.3);
      scene.tweens.add({
        targets: banner, scale: 1, duration: 400, ease: 'Back.out',
        onComplete: () => {
          scene.tweens.add({
            targets: banner, alpha: 0, duration: 600, delay: 1400,
            onComplete: () => banner.destroy()
          });
        }
      });
      plim();
    }

    function chegada(scene) {
      chegou = true;
      // castelo descendo
      const castelo = scene.add.text(LARGURA / 2, -120, '🏰', {
        fontSize: '180px'
      }).setOrigin(0.5).setDepth(5);
      scene.tweens.add({
        targets: castelo, y: ALTURA / 2 - 80,
        duration: 1500, ease: 'Cubic.out'
      });
      // banner de chegada
      const banner = scene.add.text(LARGURA / 2, ALTURA / 2 + 130,
        'VOCÊ\nCHEGOU!\n🎉', {
          fontSize: '64px', color: '#ffffff', fontStyle: 'bold',
          align: 'center', stroke: '#ff66cc', strokeThickness: 8
        }).setOrigin(0.5).setDepth(20).setScale(0.3).setAlpha(0);
      scene.tweens.add({
        targets: banner, scale: 1, alpha: 1,
        duration: 600, delay: 800, ease: 'Back.out'
      });
      // confete
      const emojisConfete = ['💖', '⭐', '🌸', '✨', '🎉', '💫'];
      for (let i = 0; i < 30; i++) {
        scene.time.delayedCall(800 + i * 80, () => {
          const conf = scene.add.text(
            Phaser.Math.Between(20, LARGURA - 20), -20,
            emojisConfete[Phaser.Math.Between(0, emojisConfete.length - 1)],
            { fontSize: '36px' }
          ).setDepth(15);
          scene.tweens.add({
            targets: conf, y: ALTURA + 30,
            angle: Phaser.Math.Between(-360, 360),
            duration: Phaser.Math.Between(2200, 3500),
            onComplete: () => conf.destroy()
          });
        });
      }
      // sons festivos
      plim();
      scene.time.delayedCall(280, plim);
      scene.time.delayedCall(560, plim);
      scene.time.delayedCall(900, plim);
    }

    function tomarAi() {
      invencivel = true;
      ai();
      // perde 1 ponto (sem ficar negativo)
      if (pontos > 0) {
        pontos -= 1;
        pontosTexto.setText('🌸 ' + pontos + ' / ' + META);
        const perde = this.add.text(boneca.x, boneca.y - 40, '-1', {
          fontSize: '36px', color: '#ff3377', fontStyle: 'bold',
          stroke: '#ffffff', strokeThickness: 5
        }).setOrigin(0.5).setDepth(15);
        this.tweens.add({
          targets: perde, y: perde.y - 50, alpha: 0,
          duration: 700, onComplete: () => perde.destroy()
        });
      }
      aiTexto.setText('Ai!');
      this.cameras.main.shake(220, 0.012);
      boneca.setAlpha(0.45);
      cachorro.setAlpha(0.45);
      braco.setAlpha(0.45);
      this.tweens.add({
        targets: aiTexto, scale: { from: 0.4, to: 1.2 },
        duration: 250, yoyo: false
      });
      this.time.delayedCall(900, () => {
        aiTexto.setText('');
        aiTexto.setScale(1);
        boneca.setAlpha(1);
        cachorro.setAlpha(1);
        braco.setAlpha(1);
        invencivel = false;
      });
    }
  </script>
</body>
</html>
